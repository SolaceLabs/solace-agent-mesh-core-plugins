name: Release Readiness Check

on:
  workflow_call:
    inputs:
      pr_number:
        description: "PR number to comment on"
        required: false
        type: number
      ref:
        description: "Git ref to checkout (branch or SHA)"
        required: false
        type: string
        default: "release-please--branches--main"
    secrets:
      FOSSA_API_KEY:
        required: true
      SONARQUBE_TOKEN:
        required: true
      SONARQUBE_HOST_URL:
        required: true
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to comment on (optional)"
        required: false
        type: number
      ref:
        description: "Git ref to checkout (branch or SHA)"
        required: false
        type: string
        default: "release-please--branches--main"

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write
  statuses: write
  actions: read

jobs:
  release-readiness:
    name: Release Readiness Runner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      checks: write
      statuses: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Install Hatch
        uses: pypa/hatch@install

      - name: Run reusable release readiness aggregation
        uses: SolaceDev/solace-public-workflows/.github/actions/pr-release-readiness-check@aggregation
        with:
          pr_number: ${{ inputs.pr_number }}
          github_token: ${{ github.token }}
          fossa_api_key: ${{ secrets.FOSSA_API_KEY }}
          sonarqube_token: ${{ secrets.SONARQUBE_TOKEN }}
          sonarqube_host_url: ${{ secrets.SONARQUBE_HOST_URL }}
          repo_owner: ${{ github.repository_owner }}
          base_branch: main
          check_name: Release Readiness Check
          comment_marker: Release Readiness Check Results
          update_pr_comment: "true"
          update_check_details: "true"
          fail_on_issues: "true"
