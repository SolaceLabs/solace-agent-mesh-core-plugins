name: Release Readiness Check

on:
  workflow_call:
    inputs:
      pr_number:
        description: "PR number to comment on"
        required: false
        type: number
      ref:
        description: "Git ref to checkout (branch or SHA)"
        required: false
        type: string
        default: "release-please--branches--main"
    secrets:
      FOSSA_API_KEY:
        required: true
      SONARQUBE_TOKEN:
        required: true
      SONARQUBE_HOST_URL:
        required: true
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to comment on (optional)"
        required: false
        type: number
      ref:
        description: "Git ref to checkout (branch or SHA)"
        required: false
        type: string
        default: "release-please--branches--main"

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  release-readiness:
    name: Release Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Install Hatch
        uses: pypa/hatch@install

      - name: Get checkout SHA
        id: checkout_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create unified Release Readiness check
        id: create_check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          CHECKOUT_SHA: ${{ steps.checkout_sha.outputs.sha }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER || 0);
            let headSha = process.env.CHECKOUT_SHA;

            if (prNumber > 0) {
              try {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                });
                headSha = pr.head.sha;
              } catch (error) {
                core.warning(`Failed to fetch PR head SHA for #${prNumber}: ${error.message}`);
              }
            }

            const { data: checkRun } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Release Readiness',
              head_sha: headSha,
              status: 'in_progress',
              started_at: new Date().toISOString(),
              output: {
                title: 'Release Readiness Check',
                summary: 'Aggregating SonarQube and FOSSA results...'
              }
            });

            core.setOutput('check_run_id', String(checkRun.id));
            core.setOutput('head_sha', headSha);

      - name: Run aggregated release readiness checks
        id: aggregate
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
          SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONARQUBE_HOST_URL: ${{ secrets.SONARQUBE_HOST_URL }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import base64
          import urllib.parse
          import urllib.request
          from pathlib import Path

          workspace = Path.cwd()
          repo_owner = os.environ["REPO_OWNER"]
          fossa_api_key = os.environ["FOSSA_API_KEY"]
          sonar_token = os.environ["SONARQUBE_TOKEN"]
          sonar_host = os.environ["SONARQUBE_HOST_URL"]
          if not sonar_host.endswith("/"):
              sonar_host += "/"
          sonar_api = f"{sonar_host}api/hotspots/search"
          head_sha = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          short_sha = head_sha[:12]

          def run_cmd(cmd, cwd=None, env=None):
              return subprocess.run(
                  cmd,
                  cwd=cwd,
                  env=env,
                  check=False,
                  capture_output=True,
                  text=True,
              )

          fetch_main = run_cmd(["git", "fetch", "origin", "main"])
          if fetch_main.returncode != 0:
              print(fetch_main.stdout)
              print(fetch_main.stderr)

          changed_files = run_cmd(["git", "diff", "--name-only", "origin/main...HEAD"])
          changed = changed_files.stdout.splitlines() if changed_files.returncode == 0 else []
          plugins = sorted({line.split("/", 1)[0] for line in changed if line.startswith("sam-") and "/" in line})

          def extract_version(plugin):
              result = run_cmd(["hatch", "version"], cwd=plugin)
              version = result.stdout.strip().splitlines()[-1].strip() if result.returncode == 0 and result.stdout.strip() else ""
              return version or short_sha

          def build_fossa_url(project_id, revision, category):
              locator = urllib.parse.quote(f"custom+48578/{project_id}", safe="")
              encoded_revision = urllib.parse.quote(revision, safe="")
              return (
                  f"https://app.fossa.com/projects/{locator}/refs/branch/main/{encoded_revision}/issues/{category}"
                  "?page=1&count=20&sort=issue_count_desc&grouping=revision&status=active"
              )

          def run_fossa_guard(project_id, category, block_on, revision):
              report_path = workspace / "fossa_guard_report.json"
              if report_path.exists():
                  report_path.unlink()

              cmd = [
                  "docker",
                  "run",
                  "--rm",
                  "-e",
                  f"FOSSA_API_KEY={fossa_api_key}",
                  "-e",
                  f"FOSSA_PROJECT_ID={project_id}",
                  "-e",
                  f"FOSSA_CATEGORY={category}",
                  "-e",
                  "FOSSA_MODE=REPORT",
                  "-e",
                  f"BLOCK_ON={block_on}",
                  "-e",
                  "FOSSA_BRANCH=main",
                  "-e",
                  f"FOSSA_REVISION={revision}",
                  "-v",
                  f"{workspace}:/workspace",
                  "-w",
                  "/workspace",
                  "ghcr.io/solacedev/maas-build-actions:latest",
                  "/bin/sh",
                  "-c",
                  "source /maas-build-actions/venv/bin/activate && python3 /maas-build-actions/scripts/fossa-guard/fossa_guard.py",
              ]

              proc = run_cmd(cmd)
              report = {}
              if report_path.exists():
                  try:
                      report = json.loads(report_path.read_text(encoding="utf-8"))
                  except Exception:
                      report = {}

              summary = report.get("summary", {}) if isinstance(report, dict) else {}
              total_issues = int(summary.get("total_issues", 0) or 0)
              blocking_issues = int(summary.get("blocking_issues", 0) or 0)
              if proc.returncode != 0:
                  status = "error"
              elif blocking_issues > 0:
                  status = "failed"
              else:
                  status = "passed"

              return {
                  "status": status,
                  "total_issues": total_issues,
                  "blocking_issues": blocking_issues,
              }

          def run_sonar(project_id):
              high_count = 0
              page = 1
              page_size = 500
              auth = base64.b64encode(f"{sonar_token}:".encode()).decode()
              headers = {"Authorization": f"Basic {auth}"}
              while True:
                  params = urllib.parse.urlencode(
                      {
                          "projectKey": project_id,
                          "branch": "main",
                          "status": "TO_REVIEW",
                          "p": page,
                          "ps": page_size,
                      }
                  )
                  request = urllib.request.Request(f"{sonar_api}?{params}", headers=headers)
                  try:
                      with urllib.request.urlopen(request, timeout=30) as response:
                          payload = json.loads(response.read().decode("utf-8"))
                  except Exception:
                      # Do not classify missing SonarQube data as an issue.
                      return {"status": "passed", "issues": 0}

                  hotspots = payload.get("hotspots", [])
                  high_count += sum(1 for h in hotspots if h.get("vulnerabilityProbability") == "HIGH")
                  paging = payload.get("paging", {})
                  total = int(paging.get("total", len(hotspots)) or 0)
                  if page * page_size >= total:
                      break
                  page += 1

              return {"status": "failed" if high_count > 0 else "passed", "issues": high_count}

          rows = []
          for plugin in plugins:
              project_id = f"{repo_owner}_{plugin}"
              version = extract_version(plugin)
              sonar = run_sonar(project_id)
              licensing = run_fossa_guard(project_id, "licensing", "policy_conflict", version)
              vulnerabilities = run_fossa_guard(project_id, "vulnerability", "critical,high", version)

              plugin_has_issues = (
                  sonar["status"] == "failed"
                  or licensing["total_issues"] > 0
                  or vulnerabilities["total_issues"] > 0
              )

              rows.append(
                  {
                      "plugin": plugin,
                      "project_id": project_id,
                      "version": version,
                      "sonar_status": sonar["status"],
                      "sonar_issues": sonar["issues"],
                      "licensing_status": licensing["status"],
                      "licensing_total": licensing["total_issues"],
                      "licensing_blocking": licensing["blocking_issues"],
                      "vulnerability_status": vulnerabilities["status"],
                      "vulnerability_total": vulnerabilities["total_issues"],
                      "vulnerability_blocking": vulnerabilities["blocking_issues"],
                      "has_issues": plugin_has_issues,
                      "sonar_url": f"{sonar_host}dashboard?id={urllib.parse.quote(project_id, safe='')}",
                      "fossa_licensing_url": build_fossa_url(project_id, version, "licensing"),
                      "fossa_vulnerability_url": build_fossa_url(project_id, version, "vulnerability"),
                      "fossa_report_url": f"https://app.fossa.com/projects/{urllib.parse.quote(f'custom+48578/{project_id}', safe='')}/refs/branch/main/{urllib.parse.quote(version, safe='')}",
                  }
              )

          rows.sort(key=lambda r: (not r["has_issues"], r["plugin"]))

          def mark(status):
              if status == "passed":
                  return "✅"
              if status == "failed":
                  return "❌"
              return "⚠️"

          projects_with_issues = [r["plugin"] for r in rows if r["has_issues"]]
          projects_without_issues = [r["plugin"] for r in rows if not r["has_issues"]]
          licensing_total = sum(r["licensing_total"] for r in rows)
          vulnerability_total = sum(r["vulnerability_total"] for r in rows)
          sonar_total_issues = sum(r["sonar_issues"] for r in rows)

          overall_sonar = "✅ Passed" if sonar_total_issues == 0 else f"❌ {sonar_total_issues} Issues"
          overall_licensing = (
              "✅ Passed" if licensing_total == 0 else f"❌ {licensing_total} Issues"
          )
          overall_vulnerability = (
              "✅ Passed" if vulnerability_total == 0 else f"❌ {vulnerability_total} Issues"
          )

          lines = [
              "## 🔐 Release Readiness Check Results",
              "",
              "### Overall Status",
              "",
              "| Check | Scope | Status |",
              "|-------|-------|--------|",
              f"| SonarQube Hotspots | Per-Plugin | {overall_sonar} |",
              f"| FOSSA Licensing | Per-Plugin | {overall_licensing} |",
              f"| FOSSA Vulnerabilities | Per-Plugin | {overall_vulnerability} |",
              "",
              "### Projects With Issues",
          ]
          lines += [f"- `{p}`" for p in projects_with_issues] or ["- None"]
          lines += ["", "### Projects Without Issues"]
          lines += [f"- `{p}`" for p in projects_without_issues] or ["- None"]

          lines += [
              "",
              "### Projects Checked (Issues First)",
              "",
              "| Plugin | SonarQube Hotspots | FOSSA Vulnerabilities | License Check | SonarQube Report | FOSSA Report |",
              "|--------|-------------------|-----------------------|---------------|------------------|--------------|",
          ]
          for r in rows:
              sonar_text = "✅ Passed" if r["sonar_issues"] == 0 else f"❌ {r['sonar_issues']} Issues"
              vulnerability_text = "✅ Passed" if r["vulnerability_total"] == 0 else f"❌ {r['vulnerability_total']} Issues"
              licensing_text = "✅ Passed" if r["licensing_total"] == 0 else f"❌ {r['licensing_total']} Issues"
              lines.append(
                  f"| `{r['plugin']}` | {sonar_text} | {vulnerability_text} | {licensing_text} | "
                  f"[View report]({r['sonar_url']}) | [View report]({r['fossa_report_url']}) |"
              )

          lines += ["", "### Plugins Being Released"]
          lines += [f"- `{r['plugin']}`" for r in rows] or ["- No specific plugins detected"]
          lines += ["", "---", "*This check runs automatically on release-please PRs to ensure compliance before release.*"]

          report = "\n".join(lines)
          report_file = workspace / "release-readiness-report.md"
          report_file.write_text(report, encoding="utf-8")

          conclusion = "failure" if projects_with_issues else "success"
          summary = (
              f"❌ {len(projects_with_issues)} plugin(s) have release-readiness issues."
              if projects_with_issues
              else "✅ All release-readiness checks passed."
          )

          output_file = Path(os.environ["GITHUB_OUTPUT"])
          with output_file.open("a", encoding="utf-8") as out:
              out.write(f"report_file={report_file}\n")
              out.write(f"conclusion={conclusion}\n")
              out.write(f"summary={summary}\n")
          PY

      - name: Write step summary
        run: cat "${{ steps.aggregate.outputs.report_file }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: inputs.pr_number
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          REPORT_FILE: ${{ steps.aggregate.outputs.report_file }}
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const fs = require('fs');
            const reportPath = process.env.REPORT_FILE;
            const body = fs.existsSync(reportPath) ? fs.readFileSync(reportPath, 'utf8') : 'No report generated.';
            const prNumber = Number(process.env.PR_NUMBER);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Release Readiness Check Results')
            );

            if (existingComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });

      - name: Complete unified Release Readiness check
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          REPORT_FILE: ${{ steps.aggregate.outputs.report_file }}
          CHECK_RUN_ID: ${{ steps.create_check.outputs.check_run_id }}
          CONCLUSION: ${{ steps.aggregate.outputs.conclusion }}
          SUMMARY: ${{ steps.aggregate.outputs.summary }}
        with:
          script: |
            const fs = require('fs');
            const checkRunId = Number(process.env.CHECK_RUN_ID || 0);
            if (!checkRunId) {
              core.warning('Missing check_run_id, skipping Release Readiness check update');
              return;
            }
            const reportPath = process.env.REPORT_FILE;
            const report = fs.existsSync(reportPath) ? fs.readFileSync(reportPath, 'utf8') : 'No report generated.';

            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: checkRunId,
              status: 'completed',
              conclusion: process.env.CONCLUSION || 'failure',
              completed_at: new Date().toISOString(),
              output: {
                title: 'Release Readiness Check',
                summary: process.env.SUMMARY || 'Release readiness check completed.',
                text: report,
              },
            });

      - name: Enforce release readiness result
        if: always()
        run: |
          if [ "${{ steps.aggregate.outputs.conclusion }}" != "success" ]; then
            echo "${{ steps.aggregate.outputs.summary }}"
            exit 1
          fi