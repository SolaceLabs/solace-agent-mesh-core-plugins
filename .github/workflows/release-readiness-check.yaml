name: Release Readiness Check

on:
  workflow_call:
    inputs:
      pr_number:
        description: "PR number to comment on"
        required: false
        type: number
      ref:
        description: "Git ref to checkout (branch or SHA)"
        required: false
        type: string
        default: "release-please--branches--main"
    secrets:
      FOSSA_API_KEY:
        required: true
      SONARQUBE_TOKEN:
        required: true
      SONARQUBE_HOST_URL:
        required: true
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to comment on (optional)"
        required: false
        type: number
      ref:
        description: "Git ref to checkout (branch or SHA)"
        required: false
        type: string
        default: "release-please--branches--main"

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  extract-plugins:
    name: Extract Plugins
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.extract.outputs.plugins }}
      plugins_json: ${{ steps.extract.outputs.plugins_json }}
      head_sha: ${{ steps.get_sha.outputs.head_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Get HEAD SHA
        id: get_sha
        run: |
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Extract plugins being released
        id: extract
        run: |
          git fetch origin main
          changed_files=$(git diff --name-only origin/main...HEAD)
          plugins=$(echo "$changed_files" | grep -E '^sam-[^/]+/' | cut -d'/' -f1 | sort -u | tr '\n' ',' | sed 's/,$//' || true)
          echo "plugins=$plugins" >> "$GITHUB_OUTPUT"

          if [ -z "$plugins" ]; then
            echo "plugins_json=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json="["
          first=true
          IFS=',' read -ra arr <<< "$plugins"
          for plugin in "${arr[@]}"; do
            plugin="$(echo "$plugin" | xargs)"
            [ -z "$plugin" ] && continue
            if [ "$first" = true ]; then first=false; else json="$json,"; fi
            json="$json\"$plugin\""
          done
          json="$json]"
          echo "plugins_json=$json" >> "$GITHUB_OUTPUT"

  plugin-checks:
    name: Plugin Checks - ${{ matrix.plugin }}
    needs: extract-plugins
    if: needs.extract-plugins.outputs.plugins_json != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJSON(needs.extract-plugins.outputs.plugins_json) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.extract-plugins.outputs.head_sha }}
          fetch-depth: 0

      - name: Install Hatch
        uses: pypa/hatch@install

      - name: Extract plugin version
        id: plugin_version
        shell: bash
        working-directory: ${{ matrix.plugin }}
        run: |
          version="$(hatch version 2>/dev/null || true)"
          [ -z "$version" ] && version="$(git rev-parse --short HEAD)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: SonarQube hotspots check
        id: sonarqube
        uses: docker://ghcr.io/solacedev/maas-build-actions:latest
        continue-on-error: true
        env:
          SONARQUBE_PROJECT_KEY: "${{ github.repository_owner }}_${{ matrix.plugin }}"
          SONARQUBE_PROJECT_MAIN_BRANCH: main
          SONARQUBE_QUERY_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONARQUBE_HOTSPOTS_API_URL: ${{ secrets.SONARQUBE_HOST_URL }}api/hotspots/search
        with:
          entrypoint: /bin/sh
          args: >
            -c ". $VIRTUAL_ENV/bin/activate &&
            cd $ACTIONS_PATH/sonarqube-hotspot-checker &&
            python sonarqube_checker.py"

      - name: FOSSA licensing check
        id: fossa_licensing
        uses: SolaceDev/solace-public-workflows/.github/actions/fossa-guard@main
        continue-on-error: true
        with:
          fossa_api_key: ${{ secrets.FOSSA_API_KEY }}
          fossa_project_id: "${{ github.repository_owner }}_${{ matrix.plugin }}"
          fossa_branch: main
          fossa_revision: ${{ steps.plugin_version.outputs.version }}
          fossa_category: licensing
          fossa_mode: BLOCK
          block_on: policy_conflict

      - name: Snapshot licensing report
        if: always()
        run: |
          if [ -f fossa_guard_report.json ]; then
            cp fossa_guard_report.json fossa_guard_licensing_report.json
          else
            echo '{"summary":{"total_issues":0,"blocking_issues":0}}' > fossa_guard_licensing_report.json
          fi

      - name: FOSSA vulnerability check
        id: fossa_vulnerabilities
        uses: SolaceDev/solace-public-workflows/.github/actions/fossa-guard@main
        continue-on-error: true
        with:
          fossa_api_key: ${{ secrets.FOSSA_API_KEY }}
          fossa_project_id: "${{ github.repository_owner }}_${{ matrix.plugin }}"
          fossa_branch: main
          fossa_revision: ${{ steps.plugin_version.outputs.version }}
          fossa_category: vulnerability
          fossa_mode: BLOCK
          block_on: critical,high

      - name: Snapshot vulnerability report
        if: always()
        run: |
          if [ -f fossa_guard_report.json ]; then
            cp fossa_guard_report.json fossa_guard_vulnerability_report.json
          else
            echo '{"summary":{"total_issues":0,"blocking_issues":0}}' > fossa_guard_vulnerability_report.json
          fi

      - name: Build plugin result payload
        if: always()
        env:
          PLUGIN: ${{ matrix.plugin }}
          VERSION: ${{ steps.plugin_version.outputs.version }}
          SONAR_OUTCOME: ${{ steps.sonarqube.outcome }}
          LICENSING_OUTCOME: ${{ steps.fossa_licensing.outcome }}
          VULNERABILITY_OUTCOME: ${{ steps.fossa_vulnerabilities.outcome }}
        run: |
          python3 - <<'PY2'
          import json
          import os
          from pathlib import Path

          def counts(path):
              p = Path(path)
              if not p.exists():
                  return 0, 0
              try:
                  data = json.loads(p.read_text(encoding="utf-8"))
              except Exception:
                  return 0, 0
              summary = data.get("summary", {})
              return int(summary.get("total_issues", 0) or 0), int(summary.get("blocking_issues", 0) or 0)

          lic_total, lic_block = counts("fossa_guard_licensing_report.json")
          vul_total, vul_block = counts("fossa_guard_vulnerability_report.json")
          payload = {
              "plugin": os.environ["PLUGIN"],
              "version": os.environ.get("VERSION") or "unknown",
              "sonar_outcome": os.environ.get("SONAR_OUTCOME") or "missing",
              "fossa_licensing_outcome": os.environ.get("LICENSING_OUTCOME") or "missing",
              "fossa_vulnerability_outcome": os.environ.get("VULNERABILITY_OUTCOME") or "missing",
              "licensing_total_issues": lic_total,
              "licensing_blocking_issues": lic_block,
              "vulnerability_total_issues": vul_total,
              "vulnerability_blocking_issues": vul_block,
          }
          Path("plugin-result.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
          PY2

      - name: Upload plugin result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-readiness-result-${{ matrix.plugin }}
          path: plugin-result.json
          retention-days: 7

  report-results:
    name: Report Results
    needs: [extract-plugins, plugin-checks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Create check run
        id: create_check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const { data: checkRun } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Release Readiness',
              head_sha: '${{ needs.extract-plugins.outputs.head_sha }}',
              status: 'in_progress',
              started_at: new Date().toISOString(),
              output: { title: 'Release Readiness Check', summary: 'Aggregating plugin results...' }
            });
            core.setOutput('check_run_id', checkRun.id);

      - name: Download plugin artifacts
        if: needs.plugin-checks.result != 'skipped'
        continue-on-error: true
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: release-readiness-result-*
          merge-multiple: true
          path: release-readiness-results

      - name: Build aggregated report
        id: aggregate
        env:
          PLUGINS: ${{ needs.extract-plugins.outputs.plugins }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_HOST_URL }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          python3 - <<'PY2'
          import json
          import os
          import urllib.parse
          from pathlib import Path

          plugins = [p.strip() for p in os.environ.get("PLUGINS", "").split(",") if p.strip()]
          sonar_host = os.environ.get("SONAR_HOST_URL", "https://sonarq.solace.com/")
          if not sonar_host.endswith("/"):
              sonar_host += "/"
          repo_owner = os.environ["REPO_OWNER"]
          results_dir = Path("release-readiness-results")
          by_plugin = {}
          if results_dir.exists():
              for file in results_dir.glob("*.json"):
                  try:
                      data = json.loads(file.read_text(encoding="utf-8"))
                  except Exception:
                      continue
                  plugin = data.get("plugin")
                  if plugin:
                      by_plugin[plugin] = data

          rows = []
          for plugin in plugins:
              data = by_plugin.get(plugin, {})
              version = data.get("version", "unknown")
              project_id = f"{repo_owner}_{plugin}"
              sonar_outcome = data.get("sonar_outcome", "missing")
              lic_outcome = data.get("fossa_licensing_outcome", "missing")
              vul_outcome = data.get("fossa_vulnerability_outcome", "missing")
              lic_total = int(data.get("licensing_total_issues", 0) or 0)
              lic_block = int(data.get("licensing_blocking_issues", 0) or 0)
              vul_total = int(data.get("vulnerability_total_issues", 0) or 0)
              vul_block = int(data.get("vulnerability_blocking_issues", 0) or 0)
              rows.append({
                  "plugin": plugin,
                  "project_id": project_id,
                  "version": version,
                  "sonar_outcome": sonar_outcome,
                  "lic_outcome": lic_outcome,
                  "vul_outcome": vul_outcome,
                  "lic_total": lic_total,
                  "lic_block": lic_block,
                  "vul_total": vul_total,
                  "vul_block": vul_block,
                  "has_issues": sonar_outcome != "success" or lic_block > 0 or vul_block > 0 or lic_outcome != "success" or vul_outcome != "success",
              })
          rows.sort(key=lambda r: (not r["has_issues"], r["plugin"]))

          with_issues = [r["plugin"] for r in rows if r["has_issues"]]
          without_issues = [r["plugin"] for r in rows if not r["has_issues"]]
          lic_total = sum(r["lic_total"] for r in rows)
          lic_block = sum(r["lic_block"] for r in rows)
          vul_total = sum(r["vul_total"] for r in rows)
          vul_block = sum(r["vul_block"] for r in rows)

          sonar_failed = any(r["sonar_outcome"] != "success" for r in rows)
          lic_failed = any(r["lic_block"] > 0 or r["lic_outcome"] != "success" for r in rows)
          vul_failed = any(r["vul_block"] > 0 or r["vul_outcome"] != "success" for r in rows)

          lines = [
              "## 🔐 Release Readiness Check Results",
              "",
              "### Overall Status",
              "",
              "| Check | Scope | Status |",
              "|-------|-------|--------|",
              f"| SonarQube Hotspots | Per-Plugin | {'⚠️ Some plugins have issues' if sonar_failed else '✅ All plugins passed'} |",
              f"| FOSSA Licensing | Per-Plugin | {'⚠️' if lic_failed else '✅'} B:{lic_block} / T:{lic_total} |",
              f"| FOSSA Vulnerabilities | Per-Plugin | {'⚠️' if vul_failed else '✅'} B:{vul_block} / T:{vul_total} |",
              "",
              "### Projects With Issues",
          ]
          lines += [f"- `{p}`" for p in with_issues] or ["- None"]
          lines += ["", "### Projects Without Issues"]
          lines += [f"- `{p}`" for p in without_issues] or ["- None"]
          lines += ["", "### Projects Checked (Issues First)", "", "| Plugin | SonarQube | FOSSA Licensing | FOSSA Vulnerabilities |", "|--------|-----------|-----------------|-----------------------|"]

          for r in rows:
              project = r["project_id"]
              sonar_url = f"{sonar_host}dashboard?id={urllib.parse.quote(project, safe='')}"
              locator = urllib.parse.quote(f"custom+48578/{project}", safe="")
              rev = urllib.parse.quote(r["version"], safe="")
              lic_url = f"https://app.fossa.com/projects/{locator}/refs/branch/main/{rev}/issues/licensing?page=1&count=20&sort=issue_count_desc&grouping=revision&status=active"
              vul_url = f"https://app.fossa.com/projects/{locator}/refs/branch/main/{rev}/issues/vulnerability?page=1&count=20&sort=issue_count_desc&grouping=revision&status=active"
              sonar_status = "✅ Passed" if r["sonar_outcome"] == "success" else f"⚠️ {r['sonar_outcome']}"
              lic_status = f"B:{r['lic_block']} / T:{r['lic_total']}" + ("" if r["lic_outcome"] == "success" else f", {r['lic_outcome']}")
              vul_status = f"B:{r['vul_block']} / T:{r['vul_total']}" + ("" if r["vul_outcome"] == "success" else f", {r['vul_outcome']}")
              lines.append(f"| `{r['plugin']}` | [{project}]({sonar_url}) ({sonar_status}) | [{project}]({lic_url}) ({lic_status}) | [{project}]({vul_url}) ({vul_status}) |")

          lines += ["", "### Plugins Being Released"]
          lines += [f"- `{r['plugin']}`" for r in rows] or ["- No specific plugins detected"]
          lines += ["", "---", "*This check runs automatically on release-please PRs to ensure compliance before release.*"]

          report = "\n".join(lines)
          results_dir.mkdir(parents=True, exist_ok=True)
          report_path = results_dir / "report.md"
          report_path.write_text(report, encoding="utf-8")

          conclusion = "failure" if with_issues else "success"
          summary = f"❌ {len(with_issues)} plugin(s) have release-readiness issues." if with_issues else "✅ All release-readiness checks passed."

          out = Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as fh:
              fh.write(f"conclusion={conclusion}\n")
              fh.write(f"summary={summary}\n")
              fh.write(f"report_file={report_path}\n")
          PY2

      - name: Write step summary
        run: cat "${{ steps.aggregate.outputs.report_file }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: inputs.pr_number
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          REPORT_FILE: ${{ steps.aggregate.outputs.report_file }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync(process.env.REPORT_FILE) ? fs.readFileSync(process.env.REPORT_FILE, 'utf8') : 'No report generated.';
            const prNumber = ${{ inputs.pr_number }};
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('Release Readiness Check Results'));
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id
              });
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });

      - name: Complete check run
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          REPORT_FILE: ${{ steps.aggregate.outputs.report_file }}
          CHECK_RUN_ID: ${{ steps.create_check.outputs.check_run_id }}
          CONCLUSION: ${{ steps.aggregate.outputs.conclusion }}
          SUMMARY: ${{ steps.aggregate.outputs.summary }}
        with:
          script: |
            const fs = require('fs');
            const text = fs.existsSync(process.env.REPORT_FILE) ? fs.readFileSync(process.env.REPORT_FILE, 'utf8') : 'No report generated.';
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: process.env.CHECK_RUN_ID,
              status: 'completed',
              conclusion: process.env.CONCLUSION || 'failure',
              completed_at: new Date().toISOString(),
              output: {
                title: 'Release Readiness Check',
                summary: process.env.SUMMARY || 'Release readiness check completed.',
                text
              }
            });
