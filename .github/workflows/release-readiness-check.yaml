name: Release Readiness Check

# This workflow validates that all security checks pass before release.
# It can be called from release-please workflow or triggered manually.

on:
  workflow_call:
    inputs:
      pr_number:
        description: "PR number to comment on"
        required: false
        type: number
      ref:
        description: "Git ref to checkout (branch or SHA)"
        required: false
        type: string
        default: "release-please--branches--main"
    secrets:
      FOSSA_API_KEY:
        required: true
      SONARQUBE_TOKEN:
        required: true
      SONARQUBE_HOST_URL:
        required: true
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to comment on (optional)"
        required: false
        type: number
      ref:
        description: "Git ref to checkout (branch or SHA)"
        required: false
        type: string
        default: "release-please--branches--main"

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  # First job: Extract plugins being released
  extract-plugins:
    name: Extract Plugins
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.extract.outputs.plugins }}
      plugins_json: ${{ steps.extract.outputs.plugins_json }}
      head_sha: ${{ steps.get_sha.outputs.head_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Get HEAD SHA
        id: get_sha
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT
          echo "HEAD SHA: $HEAD_SHA"

      - name: Extract plugins being released
        id: extract
        run: |
          # Get the changed files by comparing against main
          git fetch origin main
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Extract unique plugin directories from changed files
          PLUGINS=$(echo "$CHANGED_FILES" | grep -E '^sam-[^/]+/' | cut -d'/' -f1 | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "Plugins being released: $PLUGINS"
          echo "plugins=$PLUGINS" >> $GITHUB_OUTPUT

          # Create JSON array for matrix
          if [ -z "$PLUGINS" ]; then
            echo "plugins_json=[]" >> $GITHUB_OUTPUT
          else
            JSON="["
            FIRST=true
            IFS=',' read -ra PLUGIN_ARRAY <<< "$PLUGINS"
            for plugin in "${PLUGIN_ARRAY[@]}"; do
              plugin=$(echo "$plugin" | xargs)
              if [ -z "$plugin" ]; then continue; fi
              if [ "$FIRST" = true ]; then FIRST=false; else JSON="$JSON,"; fi
              JSON="$JSON\"$plugin\""
            done
            JSON="$JSON]"
            echo "plugins_json=$JSON" >> $GITHUB_OUTPUT
          fi

  # Second job: Check SonarQube hotspots for each plugin
  sonarqube-check:
    name: SonarQube - ${{ matrix.plugin }}
    needs: extract-plugins
    if: needs.extract-plugins.outputs.plugins_json != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJSON(needs.extract-plugins.outputs.plugins_json) }}
    steps:
      - name: Create Check Run
        id: create_check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const headSha = '${{ needs.extract-plugins.outputs.head_sha }}';
            const plugin = '${{ matrix.plugin }}';
            const checkName = `SonarQube: ${plugin}`;

            console.log(`Creating check run: ${checkName}`);
            console.log(`SHA: ${headSha}`);

            const { data: checkRun } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: checkName,
              head_sha: headSha,
              status: 'in_progress',
              started_at: new Date().toISOString(),
              output: {
                title: `SonarQube Hotspot Check - ${plugin}`,
                summary: `Checking for HIGH vulnerability hotspots in ${plugin}...`
              }
            });

            console.log(`Check run created with ID: ${checkRun.id}`);
            core.setOutput('check_run_id', checkRun.id);
            return checkRun.id;
      - name: Check SonarQube Hotspots for ${{ matrix.plugin }}
        uses: docker://ghcr.io/solacedev/maas-build-actions:latest
        id: sonarqube
        continue-on-error: true
        env:
          SONARQUBE_PROJECT_KEY: "${{ github.repository_owner }}_${{ matrix.plugin }}"
          SONARQUBE_PROJECT_MAIN_BRANCH: main
          SONARQUBE_QUERY_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONARQUBE_HOTSPOTS_API_URL: ${{ secrets.SONARQUBE_HOST_URL }}api/hotspots/search
        with:
          entrypoint: /bin/sh
          args: >
            -c ". $VIRTUAL_ENV/bin/activate &&
            cd $ACTIONS_PATH/sonarqube-hotspot-checker &&
            python sonarqube_checker.py
            "
      - name: Update Check Run
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const checkRunId = '${{ steps.create_check.outputs.check_run_id }}';
            const plugin = '${{ matrix.plugin }}';
            const outcome = '${{ steps.sonarqube.outcome }}';
            const projectKey = `${{ github.repository_owner }}_${plugin}`;
            const sonarHostUrlRaw = '${{ secrets.SONARQUBE_HOST_URL }}';
            const sonarHostUrl = sonarHostUrlRaw.endsWith('/') ? sonarHostUrlRaw : `${sonarHostUrlRaw}/`;
            const sonarDashboardUrl = `${sonarHostUrl}dashboard?id=${encodeURIComponent(projectKey)}`;

            console.log(`Updating check run ID: ${checkRunId}`);
            console.log(`Plugin: ${plugin}`);
            console.log(`Outcome: ${outcome}`);

            const conclusion = outcome === 'success' ? 'success' : 'failure';
            const summary = outcome === 'success'
              ? `✅ No HIGH vulnerability hotspots found in ${plugin}`
              : `❌ Found HIGH vulnerability hotspots in ${plugin} that need to be resolved`;

            const outputText = `## SonarQube Hotspot Check\n\n` +
              `**Plugin:** \`${plugin}\`\n` +
              `**Project:** \`${projectKey}\`\n` +
              `**Dashboard:** [View SonarQube Project](${sonarDashboardUrl})\n` +
              `**Status:** ${outcome === 'success' ? '✅ Passed' : '❌ Failed'}\n\n` +
              (outcome === 'success'
                ? 'No unresolved HIGH vulnerability hotspots were found.'
                : 'HIGH vulnerability hotspots were detected and must be resolved before release.');

            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: checkRunId,
              status: 'completed',
              conclusion: conclusion,
              completed_at: new Date().toISOString(),
              output: {
                title: `SonarQube Hotspot Check - ${plugin}`,
                summary: summary,
                text: outputText
              }
            });

            console.log(`Check run completed with conclusion: ${conclusion}`);

      - name: Record result
        if: always()
        run: |
          echo "Plugin: ${{ matrix.plugin }}"
          echo "Status: ${{ steps.sonarqube.outcome }}"

  # Third job: Check FOSSA for each plugin being released
  fossa-check:
    name: FOSSA - ${{ matrix.plugin }}
    needs: extract-plugins
    if: needs.extract-plugins.outputs.plugins_json != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJSON(needs.extract-plugins.outputs.plugins_json) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.extract-plugins.outputs.head_sha || inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Create Licensing Check Run
        id: create_licensing_check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const headSha = '${{ needs.extract-plugins.outputs.head_sha }}';
            const plugin = '${{ matrix.plugin }}';
            const checkName = `FOSSA Licensing: ${plugin}`;

            console.log(`Creating check run: ${checkName}`);
            console.log(`SHA: ${headSha}`);
            console.log(`Plugin version: ${pluginVersion}`);

            const { data: checkRun } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: checkName,
              head_sha: headSha,
              status: 'in_progress',
              started_at: new Date().toISOString(),
              output: {
                title: `FOSSA Licensing Check - ${plugin}`,
                summary: `Checking licensing policy conflicts for ${plugin}...`
              }
            });

            console.log(`Licensing check run created with ID: ${checkRun.id}`);
            core.setOutput('check_run_id', checkRun.id);
            return checkRun.id;

      - name: Install Hatch
        uses: pypa/hatch@install
      - name: Create Vulnerabilities Check Run
        id: create_vulnerabilities_check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const headSha = '${{ needs.extract-plugins.outputs.head_sha }}';
            const plugin = '${{ matrix.plugin }}';
            const checkName = `FOSSA Vulnerabilities: ${plugin}`;

            console.log(`Creating check run: ${checkName}`);
            console.log(`SHA: ${headSha}`);
            console.log(`Plugin version: ${pluginVersion}`);

            const { data: checkRun } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: checkName,
              head_sha: headSha,
              status: 'in_progress',
              started_at: new Date().toISOString(),
              output: {
                title: `FOSSA Vulnerability Check - ${plugin}`,
                summary: `Checking critical/high vulnerabilities for ${plugin}...`
              }
            });

            console.log(`Vulnerabilities check run created with ID: ${checkRun.id}`);
            core.setOutput('check_run_id', checkRun.id);
            return checkRun.id;

      - name: Extract plugin version
        id: plugin_version
        shell: bash
        working-directory: ${{ matrix.plugin }}
        env:
          PLUGIN_PATH: ${{ matrix.plugin }}
        run: |
          VERSION=$(hatch version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: FOSSA Scan for ${{ matrix.plugin }}
        id: fossa_scan
        uses: SolaceDev/solace-public-workflows/.github/actions/sca/sca-scan@main
        continue-on-error: true
        with:
          scanners: "fossa"
          additional_scan_params: |
            fossa.branch=${{ steps.plugin_version.outputs.version }}
            fossa.revision=${{ needs.extract-plugins.outputs.head_sha }}
          fossa_api_key: ${{ secrets.FOSSA_API_KEY }}

      - name: FOSSA Licensing Check
        id: fossa_licensing
        uses: SolaceDev/solace-public-workflows/.github/actions/fossa-guard@main
        continue-on-error: true
        with:
          fossa_api_key: ${{ secrets.FOSSA_API_KEY }}
          fossa_project_id: "${{ github.repository_owner }}_${{ matrix.plugin }}"
          fossa_branch: ${{ steps.plugin_version.outputs.version }}
          fossa_revision: ${{ needs.extract-plugins.outputs.head_sha }}
          fossa_category: licensing
          fossa_mode: BLOCK
          block_on: policy_conflict

      - name: Update Licensing Check Run
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const checkRunId = '${{ steps.create_licensing_check.outputs.check_run_id }}';
            const plugin = '${{ matrix.plugin }}';
            const pluginVersion = '${{ steps.plugin_version.outputs.version }}';
            const revision = '${{ needs.extract-plugins.outputs.head_sha }}';
            const outcome = '${{ steps.fossa_licensing.outcome }}';
            const fossaProject = `${{ github.repository_owner }}_${plugin}`;
            const fossaLocator = `custom+48578/${fossaProject}`;
            const encodedLocator = fossaLocator.replace(/\+/g, '%2B').replace(/\//g, '%2F');
            const encodedBranch = pluginVersion.replace(/\//g, '%2F');
            const encodedRevision = revision.replace(/\//g, '%2F');
            const fossaLicensingUrl = `https://app.fossa.com/projects/${encodedLocator}/refs/branch/${encodedBranch}/${encodedRevision}/issues/licensing?page=1&count=20&sort=issue_count_desc&grouping=revision&status=active`;

            if (!checkRunId) {
              console.log(`No licensing check_run_id for ${plugin}; skipping check update`);
              return;
            }

            console.log(`Updating licensing check run ID: ${checkRunId}`);
            console.log(`Plugin: ${plugin}`);
            console.log(`Outcome: ${outcome}`);

            const conclusion = outcome === 'success' ? 'success' : 'failure';
            const summary = outcome === 'success'
              ? `✅ No licensing policy conflicts found for ${plugin}`
              : `❌ Found licensing policy conflicts for ${plugin}`;

            const outputText = `## FOSSA Licensing Check\n\n` +
              `**Plugin:** \`${plugin}\`\n` +
              `**Project:** \`${fossaProject}\`\n` +
              `**Version (fossa.branch):** \`${pluginVersion}\`\n` +
              `**Revision (fossa.revision):** \`${revision}\`\n` +
              `**Dashboard:** [View FOSSA Licensing Report](${fossaLicensingUrl})\n` +
              `**Status:** ${outcome === 'success' ? '✅ Passed' : '❌ Failed'}\n\n` +
              (outcome === 'success'
                ? 'No licensing policy conflicts were found. All dependencies comply with licensing policies.'
                : 'Licensing policy conflicts were detected. Please review and resolve before release.');

            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: checkRunId,
              status: 'completed',
              conclusion: conclusion,
              completed_at: new Date().toISOString(),
              output: {
                title: `FOSSA Licensing Check - ${plugin}`,
                summary: summary,
                text: outputText
              }
            });

            console.log(`Licensing check run completed with conclusion: ${conclusion}`);

      - name: FOSSA Vulnerability Check
        id: fossa_vulnerabilities
        uses: SolaceDev/solace-public-workflows/.github/actions/fossa-guard@main
        continue-on-error: true
        with:
          fossa_api_key: ${{ secrets.FOSSA_API_KEY }}
          fossa_project_id: "${{ github.repository_owner }}_${{ matrix.plugin }}"
          fossa_branch: ${{ steps.plugin_version.outputs.version }}
          fossa_revision: ${{ needs.extract-plugins.outputs.head_sha }}
          fossa_category: vulnerability
          fossa_mode: BLOCK
          block_on: critical,high

      - name: Update Vulnerabilities Check Run
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const checkRunId = '${{ steps.create_vulnerabilities_check.outputs.check_run_id }}';
            const plugin = '${{ matrix.plugin }}';
            const pluginVersion = '${{ steps.plugin_version.outputs.version }}';
            const revision = '${{ needs.extract-plugins.outputs.head_sha }}';
            const outcome = '${{ steps.fossa_vulnerabilities.outcome }}';
            const fossaProject = `${{ github.repository_owner }}_${plugin}`;
            const fossaLocator = `custom+48578/${fossaProject}`;
            const encodedLocator = fossaLocator.replace(/\+/g, '%2B').replace(/\//g, '%2F');
            const encodedBranch = pluginVersion.replace(/\//g, '%2F');
            const encodedRevision = revision.replace(/\//g, '%2F');
            const fossaVulnerabilityUrl = `https://app.fossa.com/projects/${encodedLocator}/refs/branch/${encodedBranch}/${encodedRevision}/issues/vulnerability?page=1&count=20&sort=issue_count_desc&grouping=revision&status=active`;

            if (!checkRunId) {
              console.log(`No vulnerability check_run_id for ${plugin}; skipping check update`);
              return;
            }

            console.log(`Updating vulnerabilities check run ID: ${checkRunId}`);
            console.log(`Plugin: ${plugin}`);
            console.log(`Outcome: ${outcome}`);

            const conclusion = outcome === 'success' ? 'success' : 'failure';
            const summary = outcome === 'success'
              ? `✅ No critical or high vulnerabilities found for ${plugin}`
              : `❌ Found critical or high vulnerabilities for ${plugin}`;

            const outputText = `## FOSSA Vulnerability Check\n\n` +
              `**Plugin:** \`${plugin}\`\n` +
              `**Project:** \`${fossaProject}\`\n` +
              `**Version (fossa.branch):** \`${pluginVersion}\`\n` +
              `**Revision (fossa.revision):** \`${revision}\`\n` +
              `**Dashboard:** [View FOSSA Vulnerability Report](${fossaVulnerabilityUrl})\n` +
              `**Severity Blocking:** critical, high\n` +
              `**Status:** ${outcome === 'success' ? '✅ Passed' : '❌ Failed'}\n\n` +
              (outcome === 'success'
                ? 'No critical or high severity vulnerabilities were found in dependencies.'
                : 'Critical or high severity vulnerabilities were detected. Please review and resolve before release.');

            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: checkRunId,
              status: 'completed',
              conclusion: conclusion,
              completed_at: new Date().toISOString(),
              output: {
                title: `FOSSA Vulnerability Check - ${plugin}`,
                summary: summary,
                text: outputText
              }
            });

            console.log(`Vulnerabilities check run completed with conclusion: ${conclusion}`);

      - name: Record result
        if: always()
        run: |
          echo "Plugin: ${{ matrix.plugin }}"
          echo "Scan Status: ${{ steps.fossa_scan.outcome }}"
          echo "Licensing Status: ${{ steps.fossa_licensing.outcome }}"
          echo "Vulnerability Status: ${{ steps.fossa_vulnerabilities.outcome }}"

  # Fourth job: Aggregate results and comment on PR
  report-results:
    name: Report Results
    needs: [extract-plugins, sonarqube-check, fossa-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Create Check Run
        id: create_check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const headSha = '${{ needs.extract-plugins.outputs.head_sha }}';
            console.log(`Creating check run for SHA: ${headSha}`);

            const { data: checkRun } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Release Readiness',
              head_sha: headSha,
              status: 'in_progress',
              started_at: new Date().toISOString(),
              output: {
                title: 'Release Readiness Check',
                summary: 'Running security and compliance checks...'
              }
            });

            console.log(`Check run created with ID: ${checkRun.id}`);
            core.setOutput('check_run_id', checkRun.id);
            return checkRun.id;

      - name: Aggregate plugin check statuses
        id: aggregate
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const headSha = '${{ needs.extract-plugins.outputs.head_sha }}';
            const pluginsRaw = '${{ needs.extract-plugins.outputs.plugins }}';
            const plugins = pluginsRaw
              ? pluginsRaw.split(',').map(p => p.trim()).filter(Boolean)
              : [];

            if (plugins.length === 0) {
              core.setOutput('sonar_result', 'skipped');
              core.setOutput('fossa_result', 'skipped');
              console.log('No plugins detected; marking SonarQube/FOSSA as skipped');
              return;
            }

            const checkRuns = await github.paginate(
              github.rest.checks.listForRef,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
                per_page: 100
              },
              (response) => response.data.check_runs || []
            );
            const byName = new Map(checkRuns.map(run => [run.name, run]));

            const evaluate = (expectedNames, label) => {
              let result = 'success';
              for (const name of expectedNames) {
                const run = byName.get(name);
                if (!run) {
                  console.log(`[${label}] Missing check run: ${name}`);
                  result = 'failure';
                  continue;
                }

                console.log(`[${label}] ${name} => ${run.status}/${run.conclusion}`);
                if (run.conclusion !== 'success') {
                  result = 'failure';
                }
              }
              return result;
            };

            const sonarChecks = plugins.map(plugin => `SonarQube: ${plugin}`);
            const fossaChecks = plugins.flatMap(plugin => [
              `FOSSA Licensing: ${plugin}`,
              `FOSSA Vulnerabilities: ${plugin}`
            ]);

            const sonarResult = evaluate(sonarChecks, 'sonar');
            const fossaResult = evaluate(fossaChecks, 'fossa');

            core.setOutput('sonar_result', sonarResult);
            core.setOutput('fossa_result', fossaResult);
            console.log(`Aggregated SonarQube result: ${sonarResult}`);
            console.log(`Aggregated FOSSA result: ${fossaResult}`);

      - name: Create Check Summary
        run: |
          echo "## 🔐 Release Readiness Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          PLUGINS="${{ needs.extract-plugins.outputs.plugins }}"
          SONAR_HOST="${{ secrets.SONARQUBE_HOST_URL }}"
          if [ "${SONAR_HOST%/}" = "$SONAR_HOST" ]; then
            SONAR_HOST="${SONAR_HOST}/"
          fi

          # Aggregated from per-plugin check run conclusions
          SONAR_RESULT="${{ steps.aggregate.outputs.sonar_result }}"
          FOSSA_RESULT="${{ steps.aggregate.outputs.fossa_result }}"

          echo "SonarQube job result: $SONAR_RESULT"
          echo "FOSSA job result: $FOSSA_RESULT"

          echo "### SonarQube Hotspots (Per-Plugin)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$SONAR_RESULT" = "success" ]; then
            echo "✅ **All plugins passed** - No unresolved HIGH vulnerability hotspots" >> $GITHUB_STEP_SUMMARY
          elif [ "$SONAR_RESULT" = "skipped" ]; then
            echo "⏭️ **Skipped** - No plugins to check" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some plugins have issues** - Check individual job results above" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "$PLUGINS" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Plugin | SonarQube Project | FOSSA Project |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------------------|---------------|" >> $GITHUB_STEP_SUMMARY
            IFS=',' read -ra PLUGIN_ARRAY <<< "$PLUGINS"
            for plugin in "${PLUGIN_ARRAY[@]}"; do
              plugin=$(echo "$plugin" | xargs)
              SONAR_PROJECT="${{ github.repository_owner }}_${plugin}"
              FOSSA_PROJECT="${{ github.repository_owner }}_${plugin}"
              SONAR_URL="${SONAR_HOST}dashboard?id=${SONAR_PROJECT}"
              FOSSA_URL="https://app.fossa.com/projects/custom%2B48578%2F${FOSSA_PROJECT}"
              echo "| \`$plugin\` | [${SONAR_PROJECT}](${SONAR_URL}) | [${FOSSA_PROJECT}](${FOSSA_URL}) |" >> $GITHUB_STEP_SUMMARY
            done
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### FOSSA Checks (Per-Plugin)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$FOSSA_RESULT" = "success" ]; then
            echo "✅ **All plugins passed** - No licensing or critical/high vulnerability issues" >> $GITHUB_STEP_SUMMARY
          elif [ "$FOSSA_RESULT" = "skipped" ]; then
            echo "⏭️ **Skipped** - No plugins to check" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some plugins have issues** - Check individual FOSSA check runs above" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "$PLUGINS" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Plugin | FOSSA Project |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|---------------|" >> $GITHUB_STEP_SUMMARY
            IFS=',' read -ra PLUGIN_ARRAY <<< "$PLUGINS"
            for plugin in "${PLUGIN_ARRAY[@]}"; do
              plugin=$(echo "$plugin" | xargs)
              echo "| \`$plugin\` | ${{ github.repository_owner }}_${plugin} |" >> $GITHUB_STEP_SUMMARY
            done
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Plugins Being Released" >> $GITHUB_STEP_SUMMARY
          if [ -n "$PLUGINS" ]; then
            IFS=',' read -ra PLUGIN_ARRAY <<< "$PLUGINS"
            for plugin in "${PLUGIN_ARRAY[@]}"; do
              echo "- \`$plugin\`" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "- No specific plugins detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on PR
        if: inputs.pr_number
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const prNumber = ${{ inputs.pr_number }};
            const pluginsToRelease = '${{ needs.extract-plugins.outputs.plugins }}';
            const sonarResult = '${{ steps.aggregate.outputs.sonar_result }}';
            const fossaResult = '${{ steps.aggregate.outputs.fossa_result }}';
            const sonarHostUrlRaw = '${{ secrets.SONARQUBE_HOST_URL }}';
            const sonarHostUrl = sonarHostUrlRaw.endsWith('/') ? sonarHostUrlRaw : `${sonarHostUrlRaw}/`;

            const getSonarProjectUrl = (projectId) =>
              `${sonarHostUrl}dashboard?id=${encodeURIComponent(projectId)}`;

            const getFossaProjectUrl = (projectId) => {
              const locator = `custom+48578/${projectId}`;
              const encodedLocator = locator.replace(/\+/g, '%2B').replace(/\//g, '%2F');
              return `https://app.fossa.com/projects/${encodedLocator}`;
            };

            const getStatusEmoji = (status) => {
              if (status === 'success') return '✅';
              if (status === 'skipped') return '⏭️';
              return '⚠️';
            };

            const getSonarStatusText = (status) => {
              if (status === 'success') return 'All plugins passed';
              if (status === 'skipped') return 'Skipped (no plugins)';
              return 'Some plugins have issues';
            };

            const getFossaStatusText = (status) => {
              if (status === 'success') return 'Passed';
              if (status === 'skipped') return 'Skipped';
              return 'Issues found';
            };

            let pluginsList = 'None detected';
            let pluginsTable = '';
            if (pluginsToRelease) {
              const plugins = pluginsToRelease.split(',').map(p => p.trim()).filter(p => p);
              pluginsList = plugins.map(p => `\`${p}\``).join(', ');
              
              pluginsTable = [
                '',
                '### Projects Checked',
                '',
                '| Plugin | SonarQube Project | FOSSA Project |',
                '|--------|-------------------|---------------|',
                ...plugins.map(p => {
                  const projectId = `${{ github.repository_owner }}_${p}`;
                  return `| \`${p}\` | [${projectId}](${getSonarProjectUrl(projectId)}) | [${projectId}](${getFossaProjectUrl(projectId)}) |`;
                }),
                ''
              ].join('\n');
            }

            const body = [
              '## 🔐 Release Readiness Check Results',
              '',
              '### Overall Status',
              '',
              '| Check | Scope | Status |',
              '|-------|-------|--------|',
              `| SonarQube Hotspots | Per-Plugin | ${getStatusEmoji(sonarResult)} ${getSonarStatusText(sonarResult)} |`,
              `| FOSSA Licensing | Per-Plugin | ${getStatusEmoji(fossaResult)} ${getFossaStatusText(fossaResult)} |`,
              `| FOSSA Vulnerabilities | Per-Plugin | ${getStatusEmoji(fossaResult)} ${getFossaStatusText(fossaResult)} |`,
              pluginsTable,
              '### Plugins Being Released',
              pluginsList,
              '',
              '---',
              '*This check runs automatically on release-please PRs to ensure compliance before release.*',
              '*Use project links above to review detailed SonarQube and FOSSA results per plugin.*'
            ].join('\n');

            // Find and delete existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Release Readiness Check Results')
            );

            if (botComment) {
              console.log(`Deleting existing comment ${botComment.id}`);
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id
              });
            }

            // Create new comment
            console.log(`Creating new comment on PR #${prNumber}`);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });

      - name: Complete Check Run
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const checkRunId = '${{ steps.create_check.outputs.check_run_id }}';
            const pluginsToRelease = '${{ needs.extract-plugins.outputs.plugins }}';
            const sonarResult = '${{ steps.aggregate.outputs.sonar_result }}';
            const fossaResult = '${{ steps.aggregate.outputs.fossa_result }}';
            const sonarHostUrlRaw = '${{ secrets.SONARQUBE_HOST_URL }}';
            const sonarHostUrl = sonarHostUrlRaw.endsWith('/') ? sonarHostUrlRaw : `${sonarHostUrlRaw}/`;

            const getSonarProjectUrl = (projectId) =>
              `${sonarHostUrl}dashboard?id=${encodeURIComponent(projectId)}`;

            const getFossaProjectUrl = (projectId) => {
              const locator = `custom+48578/${projectId}`;
              const encodedLocator = locator.replace(/\+/g, '%2B').replace(/\//g, '%2F');
              return `https://app.fossa.com/projects/${encodedLocator}`;
            };

            console.log(`Completing check run ID: ${checkRunId}`);
            console.log(`SonarQube result: ${sonarResult}`);
            console.log(`FOSSA result: ${fossaResult}`);

            // Determine overall conclusion
            let conclusion = 'success';
            if (sonarResult === 'failure' || fossaResult === 'failure') {
              conclusion = 'failure';
            } else if (sonarResult === 'cancelled' || fossaResult === 'cancelled') {
              conclusion = 'cancelled';
            }

            const getStatusEmoji = (status) => {
              if (status === 'success') return '✅';
              if (status === 'skipped') return '⏭️';
              return '❌';
            };

            const getSonarStatusText = (status) => {
              if (status === 'success') return 'All plugins passed';
              if (status === 'skipped') return 'Skipped (no plugins)';
              return 'Some plugins have issues';
            };

            const getFossaStatusText = (status) => {
              if (status === 'success') return 'All plugins passed';
              if (status === 'skipped') return 'Skipped (no plugins)';
              return 'Some plugins have issues';
            };

            // Build detailed output
            let outputText = '## Security and Compliance Checks\n\n';
            outputText += '### Overall Status\n\n';
            outputText += '| Check | Scope | Status |\n';
            outputText += '|-------|-------|--------|\n';
            outputText += `| SonarQube Hotspots | Per-Plugin | ${getStatusEmoji(sonarResult)} ${getSonarStatusText(sonarResult)} |\n`;
            outputText += `| FOSSA Licensing | Per-Plugin | ${getStatusEmoji(fossaResult)} ${getFossaStatusText(fossaResult)} |\n`;
            outputText += `| FOSSA Vulnerabilities | Per-Plugin | ${getStatusEmoji(fossaResult)} ${getFossaStatusText(fossaResult)} |\n\n`;

            // Add plugin information
            if (pluginsToRelease) {
              const plugins = pluginsToRelease.split(',').map(p => p.trim()).filter(p => p);
              outputText += '### Plugins Being Released\n\n';
              for (const plugin of plugins) {
                outputText += `- \`${plugin}\`\n`;
              }
              outputText += '\n### Projects Checked\n\n';
              outputText += '| Plugin | SonarQube Project | FOSSA Project |\n';
              outputText += '|--------|-------------------|---------------|\n';
              for (const plugin of plugins) {
                const projectId = `${context.repo.owner}_${plugin}`;
                outputText += `| \`${plugin}\` | [${projectId}](${getSonarProjectUrl(projectId)}) | [${projectId}](${getFossaProjectUrl(projectId)}) |\n`;
              }
            } else {
              outputText += '### Plugins Being Released\n\n';
              outputText += 'No specific plugins detected\n';
            }

            // Build summary
            let summary = '';
            if (conclusion === 'success') {
              summary = '✅ All security and compliance checks passed. This release is ready to proceed.';
            } else {
              summary = '❌ Some security or compliance checks failed. Please review the details below.';
            }

            // Update check run
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: checkRunId,
              status: 'completed',
              conclusion: conclusion,
              completed_at: new Date().toISOString(),
              output: {
                title: 'Release Readiness Check',
                summary: summary,
                text: outputText
              }
            });

            console.log(`Check run completed with conclusion: ${conclusion}`);
