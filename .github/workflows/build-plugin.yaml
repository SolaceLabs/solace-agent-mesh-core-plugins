name: Build Plugin
run-name: Build Plugin ${{ inputs.plugin_directory }}

on:
  workflow_call:
    inputs:
      plugin_directory:
        description: "Directory of the plugin"
        required: true
        type: string
      ref:
        description: "Git ref to checkout (branch or SHA)"
        required: false
        type: string
        default: ""
    secrets:
      COMMIT_KEY:
        required: false
      FOSSA_API_KEY:
        required: true
      SONARQUBE_TOKEN:
        required: true
      SONARQUBE_HOST_URL:
        required: true
  workflow_dispatch:
    inputs:
      plugin_directory:
        description: "Directory of the plugin"
        required: true
        type: choice
        options:
          - sam-bedrock-agent
          - sam-event-mesh-gateway
          - sam-event-mesh-tool
          - sam-geo-information
          - sam-mongodb
          - sam-nuclia-tool
          - sam-rag
          - sam-rest-gateway
          - sam-ruleset-lookup-tool
          - sam-mcp-server-gateway-adapter
          - sam-slack-gateway-adapter
          - sam-sql-database-tool
          - sam-webhook-gateway
      ref:
        description: "Git ref to checkout (branch or SHA)"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write
  actions: write
  statuses: write
  checks: write
  repository-projects: read

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    outputs:
      sonarqube_status: ${{ steps.record-sonar-result.outputs.status }}
      plugin_directory: ${{ inputs.plugin_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
          sparse-checkout: ${{ inputs.plugin_directory }}

      - name: get Sha
        id: get-sha
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "Checked out SHA: $sha"
          echo "Base SHA: ${{ github.event.pull_request.base.sha }}"
          echo "Head SHA: ${{ github.event.pull_request.head.sha }}"

      - name: Install uv
        id: setup-uv
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0
      - name: Install Hatch
        run: uv tool install hatch
      - name: Create Hatch Environment
        working-directory: ${{ inputs.plugin_directory }}
        run: hatch -v env create hatch-test.py3.13

      - name: Install ODBC Driver 18 for SQL Server
        if: inputs.plugin_directory == 'sam-sql-database-tool'
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          curl https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install FreeTDS ODBC Driver
        if: inputs.plugin_directory == 'sam-sql-database-tool'
        run: |
          sudo apt-get install -y freetds-dev tdsodbc unixodbc-dev
          sudo odbcinst -i -d -f /usr/share/tdsodbc/odbcinst.ini

      - name: Test Plugin ${{ inputs.plugin_directory }} with Python 3.13
        id: test
        continue-on-error: true
        working-directory: ${{ inputs.plugin_directory }}
        shell: bash
        run: |
          # Check if tests directory exists
          if [ ! -d "tests" ]; then
            echo "No tests directory found, skipping tests"
            echo "tests_present=false" >> $GITHUB_OUTPUT
            echo "junit_exists=false" >> $GITHUB_OUTPUT
            echo "coverage_exists=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "tests_present=true" >> $GITHUB_OUTPUT

          # Run tests with coverage if pytest-cov is available, otherwise without
          if hatch -v run hatch-test.py3.13:pip show pytest-cov > /dev/null 2>&1; then
            echo "Running tests with coverage..."
            hatch -v run hatch-test.py3.13:pytest tests/ --cov --cov-report=xml:coverage.xml --cov-report=term --junitxml=junit.xml
          else
            echo "Running tests without coverage (pytest-cov not available)..."
            hatch -v run hatch-test.py3.13:pytest tests/ --junitxml=junit.xml
          fi

          # Check if result files exist
          if [ -f coverage.xml ]; then
            echo "coverage_exists=true" >> $GITHUB_OUTPUT
          else
            echo "coverage_exists=false" >> $GITHUB_OUTPUT
          fi
          if [ -f junit.xml ]; then
            echo "junit_exists=true" >> $GITHUB_OUTPUT
          else
            echo "junit_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: SonarQube Scan
        id: sonarqube-scan
        continue-on-error: true
        uses: sonarsource/sonarqube-scan-action@540792c588b5c2740ad2bb4667db5cd46ae678f2 # v2.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_HOST_URL }}
        with:
          projectBaseDir: ${{ inputs.plugin_directory }}
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ inputs.plugin_directory }}
            -Dsonar.projectName=${{ inputs.plugin_directory }}
            -Dsonar.sources=src
            -Dsonar.python.version=3.10,3.11,3.12,3.13
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.python.coverage.reportPaths=**/coverage.xml
            -Dsonar.exclusions=**/__pycache__/**,**/dist/**,**/.hatch/**,**/build/**,**/*.egg-info/**,**/tests/**
            -Dsonar.cpd.exclusions=**/tests/**
            -Dsonar.pullrequest.github.summary_comment=false
            -Dsonar.qualitygate.wait=true

      - name: Record SonarQube Result
        id: record-sonar-result
        if: always()
        run: |
          echo "Plugin: ${{ inputs.plugin_directory }}"
          echo "SonarQube scan outcome: ${{ steps.sonarqube-scan.outcome }}"
          echo "status=${{ steps.sonarqube-scan.outcome }}" >> $GITHUB_OUTPUT

      - name: Build and Verify Package
        shell: bash
        run: |
          cd ${{ inputs.plugin_directory }}
          hatch build
          # Use uv to run twine for package verification
          uv tool run twine check dist/*.tar.gz
          uv tool run twine check dist/*.whl

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.plugin_directory }}-dist
          path: ${{ inputs.plugin_directory }}/dist/
          retention-days: 7

      - name: Resolve FOSSA scan target
        id: fossa_target
        shell: bash
        working-directory: ${{ inputs.plugin_directory }}
        run: |
          REF_HINT="${{ inputs.ref || github.ref_name }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            IS_RELEASE_PLEASE_PR=$([[ "${{ github.head_ref }}" == *"release-please"* ]] && echo "true" || echo "false")
          else
            IS_RELEASE_PLEASE_PR=$([[ "$REF_HINT" == *"release-please"* ]] && echo "true" || echo "false")
          fi

          if [[ "$IS_RELEASE_PLEASE_PR" == "true" ]]; then
            BRANCH="main"
            REVISION="$(hatch version 2>/dev/null || true)"
            if [[ -z "$REVISION" ]]; then
              REVISION="${{ steps.get-sha.outputs.sha }}"
            fi
            ENABLE_DIFF_MODE="false"
            DIFF_BASE_REVISION_SHA=""
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="PR"
            REVISION="${{ github.head_ref }}"
            ENABLE_DIFF_MODE="true"
            DIFF_BASE_REVISION_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BRANCH="${{ github.event.repository.default_branch }}"
            REVISION="${{ steps.get-sha.outputs.sha }}"
            ENABLE_DIFF_MODE="false"
            DIFF_BASE_REVISION_SHA=""
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
          echo "enable_diff_mode=$ENABLE_DIFF_MODE" >> "$GITHUB_OUTPUT"
          echo "diff_base_revision_sha=$DIFF_BASE_REVISION_SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved FOSSA scan target: branch=$BRANCH revision=$REVISION"

      # FOSSA Scan - uploads plugin data to FOSSA as unique project
      - name: FOSSA Scan
        uses: SolaceDev/solace-public-workflows/.github/actions/sca/sca-scan@main
        with:
          scanners: "fossa"
          additional_scan_params: |
            fossa.path=${{ inputs.plugin_directory }}/
            fossa.project=${{ github.repository_owner }}_${{ inputs.plugin_directory }}
            fossa.branch=${{ steps.fossa_target.outputs.branch }}
            fossa.revision=${{ steps.fossa_target.outputs.revision }}
          fossa_api_key: ${{ secrets.FOSSA_API_KEY }}

      - name: FOSSA Guard - Licensing
        id: fossa_guard_licensing
        continue-on-error: true
        uses: SolaceDev/solace-public-workflows/.github/actions/fossa-guard@main
        with:
          fossa_api_key: ${{ secrets.FOSSA_API_KEY }}
          fossa_project_id: "${{ github.repository_owner }}_${{ inputs.plugin_directory }}"
          fossa_category: licensing
          fossa_mode: REPORT
          block_on: policy_conflict
          fossa_branch: ${{ steps.fossa_target.outputs.branch }}
          fossa_revision: ${{ steps.fossa_target.outputs.revision }}
          enable_diff_mode: ${{ steps.fossa_target.outputs.enable_diff_mode }}
          diff_base_revision_sha: ${{ steps.fossa_target.outputs.diff_base_revision_sha }}
          enable_pr_comment: "false"
          enable_status_check: "false"

      - name: Persist FOSSA licensing report
        if: always()
        shell: bash
        env:
          PLUGIN: ${{ inputs.plugin_directory }}
        run: |
          SOURCE="${GITHUB_WORKSPACE}/fossa_guard_report.json"
          DEST="fossa-guard-licensing-${PLUGIN}.json"
          if [[ -f "$SOURCE" ]]; then
            cp "$SOURCE" "$DEST"
          else
            echo '{"metadata":{"category":"licensing"},"summary":{"total_issues":0,"blocking_issues":0},"issues":[]}' > "$DEST"
          fi

      - name: FOSSA Guard - Vulnerability
        id: fossa_guard_vulnerability
        continue-on-error: true
        uses: SolaceDev/solace-public-workflows/.github/actions/fossa-guard@main
        with:
          fossa_api_key: ${{ secrets.FOSSA_API_KEY }}
          fossa_project_id: "${{ github.repository_owner }}_${{ inputs.plugin_directory }}"
          fossa_category: vulnerability
          fossa_mode: REPORT
          block_on: critical,high
          fossa_branch: ${{ steps.fossa_target.outputs.branch }}
          fossa_revision: ${{ steps.fossa_target.outputs.revision }}
          enable_diff_mode: ${{ steps.fossa_target.outputs.enable_diff_mode }}
          diff_base_revision_sha: ${{ steps.fossa_target.outputs.diff_base_revision_sha }}
          enable_pr_comment: "false"
          enable_status_check: "false"

      - name: Persist FOSSA vulnerability report
        if: always()
        shell: bash
        env:
          PLUGIN: ${{ inputs.plugin_directory }}
        run: |
          SOURCE="${GITHUB_WORKSPACE}/fossa_guard_report.json"
          DEST="fossa-guard-vulnerability-${PLUGIN}.json"
          if [[ -f "$SOURCE" ]]; then
            cp "$SOURCE" "$DEST"
          else
            echo '{"metadata":{"category":"vulnerability"},"summary":{"total_issues":0,"blocking_issues":0},"issues":[]}' > "$DEST"
          fi

      - name: Build CI plugin result payload
        if: always()
        shell: bash
        env:
          PLUGIN: ${{ inputs.plugin_directory }}
          REPO_OWNER: ${{ github.repository_owner }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          TESTS_PRESENT: ${{ steps.test.outputs.tests_present }}
          JUNIT_EXISTS: ${{ steps.test.outputs.junit_exists }}
          COVERAGE_EXISTS: ${{ steps.test.outputs.coverage_exists }}
          SONAR_OUTCOME: ${{ steps.sonarqube-scan.outcome }}
          FOSSA_BRANCH: ${{ steps.fossa_target.outputs.branch }}
          FOSSA_REVISION: ${{ steps.fossa_target.outputs.revision }}
          FOSSA_DIFF_MODE: ${{ steps.fossa_target.outputs.enable_diff_mode }}
          FOSSA_LICENSING_OUTCOME: ${{ steps.fossa_guard_licensing.outcome }}
          FOSSA_VULNERABILITY_OUTCOME: ${{ steps.fossa_guard_vulnerability.outcome }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from urllib.parse import quote

          def _load_summary(path: str) -> tuple[int, int]:
              report_path = Path(path)
              if not report_path.exists():
                  return 0, 0
              try:
                  payload = json.loads(report_path.read_text(encoding="utf-8"))
              except Exception:
                  return 0, 0
              summary = payload.get("summary", {}) if isinstance(payload, dict) else {}
              total = int(summary.get("total_issues", 0) or 0)
              blocking = int(summary.get("blocking_issues", 0) or 0)
              return total, blocking

          tests_present = os.environ.get("TESTS_PRESENT") == "true"
          test_outcome = os.environ.get("TEST_OUTCOME", "missing")
          if not tests_present:
              tests_status = "skipped"
          elif test_outcome == "success":
              tests_status = "passed"
          else:
              tests_status = "failed"

          plugin = os.environ.get("PLUGIN")
          repo_owner = os.environ.get("REPO_OWNER")
          branch = os.environ.get("FOSSA_BRANCH", "")
          revision = os.environ.get("FOSSA_REVISION", "")
          diff_mode = os.environ.get("FOSSA_DIFF_MODE", "false") == "true"
          project_id = f"{repo_owner}_{plugin}"
          locator = quote(f"custom+48578/{project_id}", safe="")
          encoded_branch = quote(branch, safe="")
          encoded_revision = quote(revision, safe="")
          report_url = f"https://app.fossa.com/projects/{locator}/refs/branch/{encoded_branch}/{encoded_revision}"

          licensing_total, licensing_blocking = _load_summary(
              f"fossa-guard-licensing-{plugin}.json"
          )
          vulnerability_total, vulnerability_blocking = _load_summary(
              f"fossa-guard-vulnerability-{plugin}.json"
          )

          payload = {
              "plugin": plugin,
              "tests_status": tests_status,
              "tests_present": tests_present,
              "test_outcome": test_outcome,
              "junit_exists": os.environ.get("JUNIT_EXISTS") == "true",
              "coverage_exists": os.environ.get("COVERAGE_EXISTS") == "true",
              "sonar_outcome": os.environ.get("SONAR_OUTCOME", "missing"),
              "fossa_project_id": project_id,
              "fossa_branch": branch,
              "fossa_revision": revision,
              "fossa_diff_mode": diff_mode,
              "fossa_report_url": report_url,
              "fossa_licensing_outcome": os.environ.get("FOSSA_LICENSING_OUTCOME", "missing"),
              "fossa_licensing_total_issues": licensing_total,
              "fossa_licensing_blocking_issues": licensing_blocking,
              "fossa_vulnerability_outcome": os.environ.get("FOSSA_VULNERABILITY_OUTCOME", "missing"),
              "fossa_vulnerability_total_issues": vulnerability_total,
              "fossa_vulnerability_blocking_issues": vulnerability_blocking,
          }
          result_file = f"ci-plugin-result-{plugin}.json"
          Path(result_file).write_text(json.dumps(payload, indent=2), encoding="utf-8")
          PY

      - name: Upload CI plugin result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-plugin-result-${{ inputs.plugin_directory }}
          path: ci-plugin-result-${{ inputs.plugin_directory }}.json
          retention-days: 7
