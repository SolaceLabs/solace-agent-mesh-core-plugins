name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write
  statuses: write
  actions: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    environment: pypi
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      releases_json: ${{ steps.collect-releases.outputs.releases_json }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr_number: ${{ steps.get_pr.outputs.pr_number }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.SAM_PLUGINS_PR_CREATE_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Collect created releases
        id: collect-releases
        env:
          PATHS_RELEASED_JSON: ${{ steps.release.outputs.paths_released }}
        run: |
          RELEASES_JSON="$(
            python3 .github/scripts/build_release_publish_matrix.py \
              --paths-released-json "${PATHS_RELEASED_JSON:-[]}" \
              --config-path release-please-config.json \
              --manifest-path .release-please-manifest.json
          )"
          echo "releases_json=$RELEASES_JSON" >> "$GITHUB_OUTPUT"

      - name: Get PR number
        id: get_pr
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const prJson = ${{ steps.release.outputs.pr }};
            console.log('PR Number:', prJson.number);
            core.setOutput('pr_number', prJson.number);

      - name: Debug outputs
        run: |
          echo "releases_created: ${{ steps.release.outputs.releases_created }}"
          echo "paths_released: ${{ steps.release.outputs.paths_released }}"
          echo "releases_json: ${{ steps.collect-releases.outputs.releases_json }}"
          echo "prs_created: ${{ steps.release.outputs.prs_created }}"
          echo "pr_number: ${{ steps.get_pr.outputs.pr_number }}"

  publish-created-releases:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true' && needs.release-please.outputs.releases_json != '[]'
    uses: ./.github/workflows/publish.yaml
    with:
      releases_json: ${{ needs.release-please.outputs.releases_json }}
    secrets: inherit
