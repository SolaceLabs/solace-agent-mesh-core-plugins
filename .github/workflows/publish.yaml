name: Publish Package

# This workflow triggers when a GitHub Release is published.
# Release-please creates releases when the Release PR is merged.
# Each plugin in the monorepo gets its own release with tag format: <plugin-name>-v<version>
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # Required for PyPI Trusted Publishing
  checks: write # For FOSSA status checks
  statuses: write # For FOSSA commit status
  pull-requests: write # For FOSSA to comment (if needed)

jobs:
  # Extract metadata from release tag
  extract-metadata:
    name: Extract Package Metadata
    runs-on: ubuntu-latest
    outputs:
      package_path: ${{ steps.extract.outputs.path }}
      version: ${{ steps.extract.outputs.version }}
      full_tag: ${{ steps.extract.outputs.full_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Extract package path from release tag
        id: extract
        run: |
          # Release tag format: <package-name>-v<version>
          # Example: sam-slack-v0.3.0
          TAG="${{ github.event.release.tag_name }}"
          echo "Tag: $TAG"

          # Extract package name (everything before -v followed by version number)
          PACKAGE_PATH=$(echo "$TAG" | sed 's/-v[0-9].*//')
          VERSION=$(echo "$TAG" | sed 's/.*-v//')

          echo "Package path: $PACKAGE_PATH"
          echo "Version: $VERSION"

          echo "path=$PACKAGE_PATH" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "full_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Verify package exists
        run: |
          if [ ! -d "${{ steps.extract.outputs.path }}" ]; then
            echo "Error: Package directory '${{ steps.extract.outputs.path }}' not found"
            exit 1
          fi
          echo "Found package at ${{ steps.extract.outputs.path }}"

  # FOSSA scan BEFORE publishing - blocks if violations found
  fossa-scan:
    name: FOSSA Security Scan
    needs: [extract-metadata]
    uses: SolaceDev/solace-public-workflows/.github/workflows/sca-scan-and-guard.yaml@main
    with:
      git_ref: ${{ needs.extract-metadata.outputs.full_tag }}
      use_vault: false
      config_file: '${{ needs.extract-metadata.outputs.package_path }}/workflow-config.json'
      additional_scan_params: |
        fossa.config=${{ needs.extract-metadata.outputs.package_path }}/.fossa.yml
        fossa.revision=${{ needs.extract-metadata.outputs.version }}
    secrets:
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}

  # Publish to PyPI only if FOSSA passes
  publish:
    name: Publish to PyPI
    needs: [extract-metadata, fossa-scan]
    runs-on: ubuntu-latest
    environment: pypi # Environment with PyPI trusted publisher configured
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install hatch twine

      - name: Build package
        run: |
          cd ${{ needs.extract-metadata.outputs.package_path }}
          hatch build

      - name: Show built artifacts
        run: |
          echo "Built artifacts for ${{ needs.extract-metadata.outputs.package_path }}:"
          ls -la ${{ needs.extract-metadata.outputs.package_path }}/dist/

      - name: Verify package version
        run: |
          cd ${{ needs.extract-metadata.outputs.package_path }}
          # Check that the built package version matches the release tag
          BUILT_VERSION=$(hatch version)
          EXPECTED_VERSION="${{ needs.extract-metadata.outputs.version }}"

          echo "Built version: $BUILT_VERSION"
          echo "Expected version: $EXPECTED_VERSION"

          if [ "$BUILT_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Warning: Version mismatch - built=$BUILT_VERSION, expected=$EXPECTED_VERSION"
          fi

      # Publish using PyPI Trusted Publishing
      # See: https://docs.pypi.org/trusted-publishers/using-a-publisher/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: ${{ needs.extract-metadata.outputs.package_path }}/dist/
          verbose: true

      - name: Update Release with build artifacts
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ${{ needs.extract-metadata.outputs.package_path }}/dist/*.whl
            ${{ needs.extract-metadata.outputs.package_path }}/dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create summary
        run: |
          echo "## 📦 Package Published Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** ${{ needs.extract-metadata.outputs.package_path }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.extract-metadata.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.event.release.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Checks" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ FOSSA License Policy Check passed (scanned before publishing)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ FOSSA Vulnerability Scan completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built artifacts:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la ${{ needs.extract-metadata.outputs.package_path }}/dist/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
