name: Publish Package

on:
  workflow_call:
    inputs:
      releases_json:
        description: "JSON array of released plugins to build and publish"
        required: true
        type: string
    secrets:
      FOSSA_API_KEY:
        required: true
      SAM_PLUGINS_PR_CREATE_TOKEN:
        required: true

permissions:
  contents: write
  checks: write # For FOSSA status checks

jobs:
  publish:
    name: Build, attach, and publish ${{ matrix.release.plugin_path }}
    runs-on: ubuntu-latest
    environment: pypi
    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJson(inputs.releases_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify package exists
        run: |
          if [ ! -d "${{ matrix.release.plugin_path }}" ]; then
            echo "Error: Package directory '${{ matrix.release.plugin_path }}' not found"
            exit 1
          fi
          echo "Found package at ${{ matrix.release.plugin_path }}"
          echo "Release tag: ${{ matrix.release.release_tag }}"
          echo "Version: ${{ matrix.release.version }}"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install hatch twine

      - name: Build package
        run: |
          cd ${{ matrix.release.plugin_path }}
          hatch build

      - name: Show built artifacts
        run: |
          echo "Built artifacts for ${{ matrix.release.plugin_path }}:"
          ls -la ${{ matrix.release.plugin_path }}/dist/

      - name: Verify package version
        run: |
          cd ${{ matrix.release.plugin_path }}
          # Check that the built package version matches the release tag
          BUILT_VERSION=$(hatch version)
          EXPECTED_VERSION="${{ matrix.release.version }}"

          echo "Built version: $BUILT_VERSION"
          echo "Expected version: $EXPECTED_VERSION"

          if [ "$BUILT_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Warning: Version mismatch - built=$BUILT_VERSION, expected=$EXPECTED_VERSION"
          fi

      - name: Update Release with build artifacts
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ matrix.release.release_tag }}
          files: |
            ${{ matrix.release.plugin_path }}/dist/*.whl
            ${{ matrix.release.plugin_path }}/dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        # Run FOSSA scan and tag with version for license tracking
      - name: FOSSA Scan - Publish
        continue-on-error: true
        uses: SolaceDev/solace-public-workflows/.github/actions/sca/sca-scan@main # main
        with:
          scanners: fossa
          fossa_api_key: ${{ secrets.FOSSA_API_KEY }}
          additional_scan_params: |
            fossa.branch=main
            fossa.revision=${{ matrix.release.version }}
            fossa.config=${{ matrix.release.plugin_path }}/.fossa.yml

      - name: Dispatch package index publish workflow
        env:
          PROJECT_NAME: ${{ matrix.release.plugin_path }}
          VERSION: ${{ matrix.release.version }}
          GH_TOKEN: ${{ secrets.SAM_PLUGINS_PR_CREATE_TOKEN }}
        run: |
          if [[ -z "$PROJECT_NAME" || -z "$VERSION" ]]; then
            echo "Both project-name and version are required."
            exit 1
          fi

          gh workflow run "release.yaml" \
            --repo "${{ github.repository }}" \
            --ref main \
            -f project-name="$PROJECT_NAME" \
            -f version="$VERSION"

      - name: Create summary
        run: |
          echo "## Release Artifacts Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** ${{ matrix.release.plugin_path }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ matrix.release.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ matrix.release.release_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**FOSSA Revision:** ${{ matrix.release.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Checks" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ FOSSA Vulnerability Check passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ FOSSA Licensing Check passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ release.yaml dispatched" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built artifacts:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la ${{ matrix.release.plugin_path }}/dist/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
