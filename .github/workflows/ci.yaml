name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  actions: write
  statuses: write
  checks: write
  repository-projects: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

jobs:
  # Validate conventional commits for PRs
  validate-conventional-commit:
    name: "Validate Conventional Commit"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Validate PR Title
        uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            deps
            revert
          requireScope: false
          disallowScopes: |
            release
          subjectPattern: ^.+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            is not empty.

  # Label PR based on changed files and determine which plugins to build
  label-pr:
    runs-on: ubuntu-24.04
    outputs:
      all_plugins: ${{ steps.format-labels.outputs.all-plugins }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Label PR based on changes
        id: label-pr
        if: github.event_name == 'pull_request'
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
          configuration-path: .github/pr_labeler.yaml

      - name: Get changed plugins in PR
        id: changed-pr
        if: github.event_name == 'pull_request'
        run: |
          # Get all changed files in the PR by comparing against the base branch
          # This compares the merge base to the PR head, capturing ALL changes in the PR
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"

          # Get changed files between base and head of PR
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files in PR:"
          echo "$CHANGED_FILES"

          # Extract plugin directories (top-level directories starting with sam-)
          PLUGINS=$(echo "$CHANGED_FILES" | grep -E '^sam-[^/]+/' | cut -d'/' -f1 | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "Changed plugins: $PLUGINS"
          echo "plugins=$PLUGINS" >> $GITHUB_OUTPUT

      - name: Get changed plugins on push
        id: changed-push
        if: github.event_name == 'push'
        run: |
          # Get changed files between HEAD and HEAD~1
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only $(git rev-list --max-parents=0 HEAD) HEAD)
          echo "Changed files: $CHANGED_FILES"

          # Extract plugin directories (top-level directories starting with sam-)
          PLUGINS=$(echo "$CHANGED_FILES" | grep -E '^sam-[^/]+/' | cut -d'/' -f1 | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "Changed plugins: $PLUGINS"
          echo "plugins=$PLUGINS" >> $GITHUB_OUTPUT

      - name: Format plugins for matrix
        id: format-labels
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # Use changed plugins detected from PR diff
            PLUGINS="${{ steps.changed-pr.outputs.plugins }}"
          else
            # Use changed plugins from push
            PLUGINS="${{ steps.changed-push.outputs.plugins }}"
          fi

          echo "Changed plugins: $PLUGINS"

          # Convert comma-separated list to JSON array of objects
          if [ -z "$PLUGINS" ]; then
            echo "all-plugins=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          JSON="["
          FIRST=true
          IFS=',' read -ra PLUGIN_ARRAY <<< "$PLUGINS"
          for plugin in "${PLUGIN_ARRAY[@]}"; do
            # Trim whitespace
            plugin=$(echo "$plugin" | xargs)
            if [ -z "$plugin" ]; then
              continue
            fi
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              JSON="$JSON,"
            fi
            JSON="$JSON{\"plugin_directory\":\"$plugin\"}"
          done
          JSON="$JSON]"

          echo "Generated JSON: $JSON"
          echo "all-plugins=$JSON" >> $GITHUB_OUTPUT

  # Build and test each plugin that changed
  builds:
    needs: label-pr
    if: needs.label-pr.outputs.all_plugins != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.label-pr.outputs.all_plugins) }}
    name: Build Plugin - ${{ matrix.plugin_directory }}
    uses: ./.github/workflows/build-plugin.yaml
    with:
      plugin_directory: ${{ matrix.plugin_directory }}
    secrets:
      COMMIT_KEY: ${{ secrets.COMMIT_KEY }}
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
      SONARQUBE_HOST_URL: ${{ secrets.SONARQUBE_HOST_URL }}

  # Aggregate SonarQube Quality Gate results for all plugins
  sonarqube-quality-gate:
    name: SonarQube Quality Gate
    needs: [label-pr, builds]
    if: always() && github.event_name == 'pull_request' && needs.label-pr.outputs.all_plugins != '[]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      checks: write
    steps:
      - name: Create Check Run
        id: create_check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const headSha = '${{ github.event.pull_request.head.sha }}';
            console.log(`Creating SonarQube Quality Gate check run for SHA: ${headSha}`);

            const { data: checkRun } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'SonarQube Quality Gate',
              head_sha: headSha,
              status: 'in_progress',
              started_at: new Date().toISOString(),
              output: {
                title: 'SonarQube Quality Gate Check',
                summary: 'Checking quality gate status for all modified plugins...'
              }
            });

            console.log(`Check run created with ID: ${checkRun.id}`);
            core.setOutput('check_run_id', checkRun.id);
            return checkRun.id;

      - name: Aggregate Quality Gate Results
        id: aggregate
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          SONARQUBE_HOST_URL: ${{ secrets.SONARQUBE_HOST_URL }}
        with:
          script: |
            const plugins = JSON.parse('${{ needs.label-pr.outputs.all_plugins }}');
            const prNumber = context.payload.pull_request.number;
            const headSha = '${{ github.event.pull_request.head.sha }}';
            const sonarHostUrl = process.env.SONARQUBE_HOST_URL || 'https://sonarq.solace.com';

            console.log(`Processing ${plugins.length} plugins`);
            console.log(`Head SHA: ${headSha}`);

            // Get all check runs for this commit
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              per_page: 100
            });

            console.log(`Found ${checkRuns.check_runs.length} check runs total`);

            let allPassed = true;
            let pluginResults = [];

            for (const pluginObj of plugins) {
              const plugin = pluginObj.plugin_directory;
              const checkName = `SonarQube: ${plugin}`;

              // Find the check run for this plugin
              const checkRun = checkRuns.check_runs.find(run => run.name === checkName);

              let status = 'unknown';
              let statusEmoji = '❓';

              if (checkRun) {
                console.log(`Plugin: ${plugin}, Check conclusion: ${checkRun.conclusion}`);

                if (checkRun.conclusion === 'success') {
                  status = 'passed';
                  statusEmoji = '✅';
                } else if (checkRun.conclusion === 'failure') {
                  status = 'failed';
                  statusEmoji = '❌';
                  allPassed = false;
                } else if (checkRun.conclusion === 'neutral' || checkRun.conclusion === 'skipped') {
                  status = checkRun.conclusion;
                  statusEmoji = '⏭️';
                } else {
                  status = checkRun.conclusion || 'unknown';
                  statusEmoji = '⚠️';
                }
              } else {
                console.log(`Check run not found for ${plugin}`);
                statusEmoji = '⚠️';
              }

              const sonarUrl = `${sonarHostUrl}dashboard?id=${context.repo.owner}_${plugin}&pullRequest=${prNumber}`;

              pluginResults.push({
                plugin: plugin,
                status: status,
                statusEmoji: statusEmoji,
                url: sonarUrl
              });

              console.log(`Plugin: ${plugin}, Status: ${status}`);
            }

            core.setOutput('all_passed', allPassed);
            core.setOutput('plugin_results', JSON.stringify(pluginResults));
            return { allPassed, pluginResults };

      - name: Update Check Run
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const checkRunId = '${{ steps.create_check.outputs.check_run_id }}';
            const allPassed = '${{ steps.aggregate.outputs.all_passed }}' === 'true';
            const pluginResults = JSON.parse('${{ steps.aggregate.outputs.plugin_results }}');

            console.log(`Updating check run ID: ${checkRunId}`);
            console.log(`All passed: ${allPassed}`);

            const conclusion = allPassed ? 'success' : 'failure';
            const summary = allPassed
              ? '✅ All plugins passed SonarQube quality gate'
              : '❌ Some plugins failed SonarQube quality gate';

            let outputText = '## SonarQube Quality Gate Results\n\n';
            outputText += '| Plugin | Status | SonarQube |\n';
            outputText += '|--------|--------|----------|\n';

            for (const result of pluginResults) {
              const statusText = result.status === 'passed' ? 'Passed' :
                                 result.status === 'failed' ? 'Failed' :
                                 result.status.charAt(0).toUpperCase() + result.status.slice(1);
              outputText += `| \`${result.plugin}\` | ${result.statusEmoji} ${statusText} | [View Results](${result.url}) |\n`;
            }

            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: checkRunId,
              status: 'completed',
              conclusion: conclusion,
              completed_at: new Date().toISOString(),
              output: {
                title: 'SonarQube Quality Gate Check',
                summary: summary,
                text: outputText
              }
            });

            console.log(`Check run completed with conclusion: ${conclusion}`);

      - name: Comment on PR
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const pluginResults = JSON.parse('${{ steps.aggregate.outputs.plugin_results }}');
            const allPassed = '${{ steps.aggregate.outputs.all_passed }}' === 'true';
            const prNumber = context.payload.pull_request.number;

            const header = allPassed
              ? '## ✅ SonarQube Quality Gate - All Passed'
              : '## ❌ SonarQube Quality Gate - Issues Found';

            let tableRows = [];
            for (const result of pluginResults) {
              const statusText = result.status === 'passed' ? 'Passed' :
                                 result.status === 'failed' ? 'Failed' :
                                 result.status.charAt(0).toUpperCase() + result.status.slice(1);
              tableRows.push(`| \`${result.plugin}\` | ${result.statusEmoji} ${statusText} | [See analysis details on SonarQube](${result.url}) |`);
            }

            const body = [
              header,
              '',
              '| Plugin | Quality Gate Status | Analysis |',
              '|--------|-------------------|----------|',
              ...tableRows,
              '',
              '---',
              '*Quality gate checks are run for each modified plugin. Click the SonarQube links above for detailed analysis.*'
            ].join('\n');

            // Find and delete existing SonarQube comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('SonarQube Quality Gate')
            );

            if (existingComment) {
              console.log(`Deleting existing comment ${existingComment.id}`);
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id
              });
            }

            // Create new comment
            console.log(`Creating new SonarQube comment on PR #${prNumber}`);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });

  # Aggregate FOSSA diff guard across all changed plugins into one check/comment
  fossa-report:
    name: FOSSA Report
    needs: [label-pr, builds]
    if: always() && github.event_name == 'pull_request' && !contains(github.head_ref, 'release-please') && needs.label-pr.outputs.all_plugins != '[]' && (needs.builds.result == 'success' || needs.builds.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
      PLUGINS_JSON: ${{ needs.label-pr.outputs.all_plugins }}
      REPO_OWNER: ${{ github.repository_owner }}
      HEAD_REF: ${{ github.head_ref }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Run FOSSA diff scans for all changed plugins
        shell: bash
        run: |
          mkdir -p fossa-report
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import urllib.parse
          from pathlib import Path

          plugins = [p["plugin_directory"] for p in json.loads(os.environ["PLUGINS_JSON"])]
          owner = os.environ["REPO_OWNER"]
          head_ref = os.environ["HEAD_REF"]
          base_sha = os.environ["BASE_SHA"]
          fossa_api_key = os.environ["FOSSA_API_KEY"]
          workspace = os.getcwd()

          def run_guard(project_id: str, category: str, block_on: str):
              cmd = [
                  "docker", "run", "--rm",
                  "-e", f"FOSSA_API_KEY={fossa_api_key}",
                  "-e", f"FOSSA_PROJECT_ID={project_id}",
                  "-e", f"FOSSA_CATEGORY={category}",
                  "-e", "FOSSA_MODE=REPORT",
                  "-e", f"BLOCK_ON={block_on}",
                  "-e", "FOSSA_BRANCH=PR",
                  "-e", f"FOSSA_REVISION={head_ref}",
                  "-e", "ENABLE_DIFF_MODE=true",
                  "-e", f"DIFF_BASE_REVISION_SHA={base_sha}",
                  "-v", f"{workspace}:/workspace",
                  "-w", "/workspace",
                  "ghcr.io/solacedev/maas-build-actions:latest",
                  "/bin/sh",
                  "-c",
                  "source /maas-build-actions/venv/bin/activate && python3 /maas-build-actions/scripts/fossa-guard/fossa_guard.py",
              ]
              completed = subprocess.run(cmd, check=False)
              report_file = Path("fossa_guard_report.json")
              report_data = {}
              if report_file.exists():
                  try:
                      report_data = json.loads(report_file.read_text(encoding="utf-8"))
                  except Exception:
                      report_data = {}
              return completed.returncode, report_data

          def summary_counts(report: dict):
              summary = report.get("summary", {}) if isinstance(report, dict) else {}
              total = int(summary.get("total_issues", 0) or 0)
              blocking = int(summary.get("blocking_issues", 0) or 0)
              return total, blocking

          results = []
          for plugin in plugins:
              project_id = f"{owner}_{plugin}"
              locator = urllib.parse.quote(f"custom+48578/{project_id}", safe="")
              encoded_revision = urllib.parse.quote(head_ref, safe="")

              lic_rc, lic_report = run_guard(project_id, "licensing", "policy_conflict")
              lic_total, lic_blocking = summary_counts(lic_report)
              Path(f"fossa-report/{plugin}-licensing.json").write_text(
                  json.dumps(lic_report, indent=2), encoding="utf-8"
              )

              vul_rc, vul_report = run_guard(project_id, "vulnerability", "critical,high")
              vul_total, vul_blocking = summary_counts(vul_report)
              Path(f"fossa-report/{plugin}-vulnerability.json").write_text(
                  json.dumps(vul_report, indent=2), encoding="utf-8"
              )

              licensing_url = (
                  f"https://app.fossa.com/projects/{locator}/refs/branch/PR/{encoded_revision}/issues/licensing"
                  "?page=1&count=20&sort=issue_count_desc&grouping=revision&status=active"
              )
              vulnerability_url = (
                  f"https://app.fossa.com/projects/{locator}/refs/branch/PR/{encoded_revision}/issues/vulnerability"
                  "?page=1&count=20&sort=issue_count_desc&grouping=revision&status=active"
              )

              has_issues = (
                  lic_blocking > 0
                  or vul_blocking > 0
                  or lic_rc != 0
                  or vul_rc != 0
              )

              results.append({
                  "plugin": plugin,
                  "project_id": project_id,
                  "licensing_total_issues": lic_total,
                  "licensing_blocking_issues": lic_blocking,
                  "licensing_exit_code": lic_rc,
                  "vulnerability_total_issues": vul_total,
                  "vulnerability_blocking_issues": vul_blocking,
                  "vulnerability_exit_code": vul_rc,
                  "licensing_url": licensing_url,
                  "vulnerability_url": vulnerability_url,
                  "has_issues": has_issues,
              })

          results.sort(key=lambda r: (not r["has_issues"], r["plugin"]))

          Path("fossa-report/results.json").write_text(
              json.dumps({"results": results}, indent=2), encoding="utf-8"
          )
          PY

      - name: Publish aggregated FOSSA report
        id: report
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'fossa-report/results.json';
            const reportData = fs.existsSync(reportPath)
              ? JSON.parse(fs.readFileSync(reportPath, 'utf8'))
              : { results: [] };
            const results = reportData.results || [];
            const prNumber = context.payload.pull_request.number;

            const withIssues = results.filter(r => r.has_issues).map(r => r.plugin);
            const withoutIssues = results.filter(r => !r.has_issues).map(r => r.plugin);

            const totalLicensing = results.reduce((sum, r) => sum + (r.licensing_total_issues || 0), 0);
            const totalLicensingBlocking = results.reduce((sum, r) => sum + (r.licensing_blocking_issues || 0), 0);
            const totalVulnerability = results.reduce((sum, r) => sum + (r.vulnerability_total_issues || 0), 0);
            const totalVulnerabilityBlocking = results.reduce((sum, r) => sum + (r.vulnerability_blocking_issues || 0), 0);

            const header = withIssues.length === 0
              ? '## ✅ FOSSA Report - All Passed'
              : '## ❌ FOSSA Report - Issues Found';

            const tableRows = results.map((r) => {
              const licensingExtra = r.licensing_exit_code === 0 ? '' : ', scan error';
              const vulnerabilityExtra = r.vulnerability_exit_code === 0 ? '' : ', scan error';
              return `| \`${r.plugin}\` | [${r.project_id}](${r.licensing_url}) (B:${r.licensing_blocking_issues} / T:${r.licensing_total_issues}${licensingExtra}) | [${r.project_id}](${r.vulnerability_url}) (B:${r.vulnerability_blocking_issues} / T:${r.vulnerability_total_issues}${vulnerabilityExtra}) |`;
            });

            const body = [
              header,
              '',
              '### Overall Counts',
              '',
              `- Licensing: **B:${totalLicensingBlocking} / T:${totalLicensing}**`,
              `- Vulnerabilities: **B:${totalVulnerabilityBlocking} / T:${totalVulnerability}**`,
              '',
              '### Projects With Issues',
              withIssues.length > 0 ? withIssues.map(p => `- \`${p}\``).join('\n') : '- None',
              '',
              '### Projects Without Issues',
              withoutIssues.length > 0 ? withoutIssues.map(p => `- \`${p}\``).join('\n') : '- None',
              '',
              '| Plugin | FOSSA Licensing | FOSSA Vulnerabilities |',
              '|--------|-----------------|-----------------------|',
              ...tableRows,
              '',
              '---',
              '*Diff mode checks compare changed plugin revisions against the PR base revision and show newly introduced issues.*',
            ].join('\n');

            await core.summary.addRaw(body).write();

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('FOSSA Report')
            );

            if (existingComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });

            const hasIssues = withIssues.length > 0;
            core.setOutput('has_issues', hasIssues ? 'true' : 'false');
            if (hasIssues) {
              core.setFailed(`FOSSA report found issues in ${withIssues.length} plugin(s).`);
            }

  # CI Status check - aggregates all job results
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [label-pr, builds, sonarqube-quality-gate, fossa-report]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [[ "${{ needs.label-pr.outputs.all_plugins }}" == "[]" ]]; then
            echo "No plugins changed, skipping build and quality checks"
          elif [[ "${{ needs.builds.result }}" == "success" || "${{ needs.builds.result }}" == "skipped" ]]; then
            echo "Build jobs passed or were skipped"

            # Check SonarQube quality gate for PRs
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              if [[ "${{ needs.sonarqube-quality-gate.result }}" == "success" || "${{ needs.sonarqube-quality-gate.result }}" == "skipped" ]]; then
                echo "SonarQube quality gate passed or was skipped"
              else
                echo "SonarQube quality gate failed"
                exit 1
              fi

              # Check aggregated FOSSA guard for non-release-please PRs
              if [[ "${{ github.head_ref }}" == *"release-please"* ]]; then
                echo "Release-please PR detected - skipping FOSSA report gate"
              elif [[ "${{ needs.fossa-report.result }}" == "success" || "${{ needs.fossa-report.result }}" == "skipped" ]]; then
                echo "FOSSA report passed or was skipped"
              else
                echo "FOSSA report failed"
                exit 1
              fi
            fi
          else
            echo "Build jobs failed"
            exit 1
          fi

          echo "All CI checks passed!"
