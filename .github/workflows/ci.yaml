name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  statuses: write
  checks: write
  repository-projects: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

jobs:
  pr-size-check:
    if: ${{  !contains(github.head_ref, 'release-please') }}
    name: PR Size Check
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      pull-requests: read
    steps:
      - name: Validate PR Size
        uses: SolaceDev/solace-public-workflows/.github/actions/pr-size-check@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          max-lines: 1500

  # Validate conventional commits for PRs
  validate-conventional-commit:
    name: "Validate Conventional Commit"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !contains(github.head_ref, 'release-please') && github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Validate PR Title
        uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            deps
            revert
          requireScope: false
          disallowScopes: |
            release
          subjectPattern: ^.+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            is not empty.

  # Label PR based on changed files and determine which plugins to build
  label-pr:
    runs-on: ubuntu-24.04
    outputs:
      all_plugins: ${{ steps.format-labels.outputs.all-plugins }}
      pr_number: ${{ steps.resolve-pr-number.outputs.pr_number }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Label PR based on changes
        id: label-pr
        if: github.event_name == 'pull_request'
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
          configuration-path: .github/pr_labeler.yaml

      - name: Get changed plugins in PR
        id: changed-pr
        if: github.event_name == 'pull_request'
        run: |
          # Get all changed files in the PR by comparing against the base branch
          # This compares the merge base to the PR head, capturing ALL changes in the PR
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"

          # Get changed files between base and head of PR
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files in PR:"
          echo "$CHANGED_FILES"

          # Extract plugin directories (top-level directories starting with sam-)
          PLUGINS=$(echo "$CHANGED_FILES" | grep -E '^sam-[^/]+/' | cut -d'/' -f1 | sort -u | tr '\n' ',' | sed 's/,$//')
          FILTERED_PLUGINS="$(PLUGINS="$PLUGINS" python3 - <<'PY'
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, str((Path(".github") / "scripts").resolve()))
          from plugin_exceptions import DEPRECATED_PLUGINS  # noqa: E402

          plugins = [p.strip() for p in os.environ.get("PLUGINS", "").split(",") if p.strip()]
          filtered = [p for p in plugins if p not in DEPRECATED_PLUGINS]
          print(",".join(filtered))
          PY
          )"
          echo "Changed plugins: $PLUGINS"
          echo "Filtered plugins (excluding deprecated): $FILTERED_PLUGINS"
          echo "plugins=$FILTERED_PLUGINS" >> $GITHUB_OUTPUT

      - name: Get changed plugins on push
        id: changed-push
        if: github.event_name == 'push'
        run: |
          # Get changed files between HEAD and HEAD~1
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only $(git rev-list --max-parents=0 HEAD) HEAD)
          echo "Changed files: $CHANGED_FILES"

          # Extract plugin directories (top-level directories starting with sam-)
          PLUGINS=$(echo "$CHANGED_FILES" | grep -E '^sam-[^/]+/' | cut -d'/' -f1 | sort -u | tr '\n' ',' | sed 's/,$//')
          FILTERED_PLUGINS="$(PLUGINS="$PLUGINS" python3 - <<'PY'
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, str((Path(".github") / "scripts").resolve()))
          from plugin_exceptions import DEPRECATED_PLUGINS  # noqa: E402

          plugins = [p.strip() for p in os.environ.get("PLUGINS", "").split(",") if p.strip()]
          filtered = [p for p in plugins if p not in DEPRECATED_PLUGINS]
          print(",".join(filtered))
          PY
          )"
          echo "Changed plugins: $PLUGINS"
          echo "Filtered plugins (excluding deprecated): $FILTERED_PLUGINS"
          echo "plugins=$FILTERED_PLUGINS" >> $GITHUB_OUTPUT

      - name: Resolve PR number
        id: resolve-pr-number
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          fi

      - name: Format plugins for matrix
        id: format-labels
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # Use changed plugins detected from PR diff
            PLUGINS="${{ steps.changed-pr.outputs.plugins }}"
          else
            # Use changed plugins from push
            PLUGINS="${{ steps.changed-push.outputs.plugins }}"
          fi

          echo "Changed plugins: $PLUGINS"

          # Convert comma-separated list to JSON array of objects
          if [ -z "$PLUGINS" ]; then
            echo "all-plugins=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          JSON="["
          FIRST=true
          IFS=',' read -ra PLUGIN_ARRAY <<< "$PLUGINS"
          for plugin in "${PLUGIN_ARRAY[@]}"; do
            # Trim whitespace
            plugin=$(echo "$plugin" | xargs)
            if [ -z "$plugin" ]; then
              continue
            fi
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              JSON="$JSON,"
            fi
            JSON="$JSON{\"plugin_directory\":\"$plugin\"}"
          done
          JSON="$JSON]"

          echo "Generated JSON: $JSON"
          echo "all-plugins=$JSON" >> $GITHUB_OUTPUT

  # Build and test each plugin that changed
  builds:
    needs: label-pr
    if: needs.label-pr.result == 'success' && needs.label-pr.outputs.all_plugins != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.label-pr.outputs.all_plugins) }}
    name: Build Plugin - ${{ matrix.plugin_directory }}
    uses: ./.github/workflows/build-plugin.yaml
    with:
      plugin_directory: ${{ matrix.plugin_directory }}
    secrets:
      COMMIT_KEY: ${{ secrets.COMMIT_KEY }}
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
      SONARQUBE_HOST_URL: ${{ secrets.SONARQUBE_HOST_URL }}

  # CI Status check - aggregates all job results
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [label-pr, builds]
    if: always() && needs.label-pr.result == 'success'
    permissions:
      pull-requests: write
      issues: write
      checks: write
      actions: write
    steps:
      - name: Download plugin result artifacts
        if: always() && github.event_name == 'pull_request' && needs.label-pr.outputs.all_plugins != '[]' && (needs.builds.result == 'success' || needs.builds.result == 'skipped')
        continue-on-error: true
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: ci-plugin-result-*
          merge-multiple: true
          path: ci-plugin-results

      - name: Run reusable release readiness aggregation
        id: release_readiness_gate
        if: always() && github.event_name == 'pull_request' && contains(github.head_ref, 'release-please') && needs.label-pr.outputs.all_plugins != '[]' && (needs.builds.result == 'success' || needs.builds.result == 'skipped')
        continue-on-error: true
        uses: SolaceDev/solace-public-workflows/.github/actions/pr-release-readiness-check@aggregation
        with:
          pr_number: ${{ github.event.pull_request.number }}
          github_token: ${{ github.token }}
          fossa_api_key: ${{ secrets.FOSSA_API_KEY }}
          sonarqube_token: ${{ secrets.SONARQUBE_TOKEN }}
          sonarqube_host_url: ${{ secrets.SONARQUBE_HOST_URL }}
          repo_owner: ${{ github.repository_owner }}
          base_branch: main
          check_name: Release Readiness Check
          comment_marker: Release Readiness Check Results
          update_pr_comment: "true"
          update_check_details: "true"
          fail_on_issues: "true"

      - name: Publish SonarQube Quality Gate check
        id: sonar_gate
        if: always() && github.event_name == 'pull_request' && !contains(github.head_ref, 'release-please') && needs.label-pr.outputs.all_plugins != '[]' && (needs.builds.result == 'success' || needs.builds.result == 'skipped')
        continue-on-error: true
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        uses: SolaceDev/solace-public-workflows/.github/actions/pr-project-check-report@aggregation
        with:
          check_type: sonarqube
          projects_json: ${{ needs.label-pr.outputs.all_plugins }}
          results_dir: ci-plugin-results
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ github.event.pull_request.number }}
          sonarqube_host_url: ${{ secrets.SONARQUBE_HOST_URL }}
          check_name: SonarQube Quality Gate
          comment_on_pr: "true"
          comment_marker: SonarQube Quality Gate
          update_check_details: "true"
          fail_on_issues: "true"

      - name: Publish Unit Tests check
        id: unit_tests_gate
        if: always() && github.event_name == 'pull_request' && !contains(github.head_ref, 'release-please') && needs.label-pr.outputs.all_plugins != '[]' && (needs.builds.result == 'success' || needs.builds.result == 'skipped')
        continue-on-error: true
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        uses: SolaceDev/solace-public-workflows/.github/actions/pr-project-check-report@aggregation
        with:
          check_type: unit-tests
          projects_json: ${{ needs.label-pr.outputs.all_plugins }}
          results_dir: ci-plugin-results
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ github.event.pull_request.number }}
          check_name: Unit Tests
          comment_on_pr: "false"
          update_check_details: "true"
          fail_on_issues: "true"

      - name: Collect CTRF reports from project payloads
        id: collect_ctrf
        if: always() && github.event_name == 'pull_request' && !contains(github.head_ref, 'release-please') && needs.label-pr.outputs.all_plugins != '[]'
        shell: bash
        env:
          RESULTS_DIR: ci-plugin-results
          OUTPUT_DIR: ctrf-plugin-reports
        run: python3 .github/scripts/collect_ctrf_reports.py

      - name: Merge CTRF reports
        id: merge_ctrf
        if: always() && steps.collect_ctrf.outputs.has_reports == 'true'
        shell: bash
        run: npx ctrf-cli@0.0.5 merge ctrf-plugin-reports --output ctrf-merged.json

      - name: Upload merged CTRF report artifact
        if: always() && steps.collect_ctrf.outputs.has_reports == 'true' && steps.merge_ctrf.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ctrf-merged-report
          path: ctrf-plugin-reports/ctrf-merged.json
          retention-days: 7

      - name: Publish CTRF Test Report
        if: always() && steps.collect_ctrf.outputs.has_reports == 'true' && steps.merge_ctrf.outcome == 'success'
        uses: ctrf-io/github-test-reporter@024bc4b64d997ca9da86833c6b9548c55c620e40 # v1.0.26
        with:
          report-path: "ctrf-plugin-reports/ctrf-merged.json"
          summary-report: true
          github-report: true
          failed-folded-report: true
          flaky-report: true
          annotate: true
          commit-report: false
          status-check: true
          status-check-name: "Unit Tests (CTRF)"
          exit-on-no-files: true
          upload-artifact: true
          artifact-name: ctrf-processed-report
          write-ctrf-to-file: ctrf-plugin-reports/ctrf-processed.json
          summary: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish FOSSA Guard check
        id: fossa_guard_gate
        if: always() && github.event_name == 'pull_request' && !contains(github.head_ref, 'release-please') && needs.label-pr.outputs.all_plugins != '[]' && (needs.builds.result == 'success' || needs.builds.result == 'skipped')
        continue-on-error: true
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        uses: SolaceDev/solace-public-workflows/.github/actions/pr-fossa-diff-report@aggregation
        with:
          plugins_json: ${{ needs.label-pr.outputs.all_plugins }}
          fossa_api_key: ${{ secrets.FOSSA_API_KEY }}
          repo_owner: ${{ github.repository_owner }}
          head_ref: ${{ github.head_ref }}
          base_sha: ${{ github.event.pull_request.base.sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          check_name: FOSSA Guard
          comment_on_pr: "true"
          comment_marker: FOSSA Guard (PR Diff)
          update_check_details: "true"
          fail_on_issues: "true"

      - name: Check CI status
        run: |
          if [[ "${{ needs.label-pr.outputs.all_plugins }}" == "[]" ]]; then
            echo "No plugins changed, skipping build and quality checks"
          elif [[ "${{ needs.builds.result }}" == "success" || "${{ needs.builds.result }}" == "skipped" ]]; then
            echo "Build jobs passed or were skipped"

            # Check SonarQube quality gate for PRs
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              if [[ "${{ github.head_ref }}" == *"release-please"* ]]; then
                if [[ "${{ steps.release_readiness_gate.outcome }}" == "success" || "${{ steps.release_readiness_gate.outcome }}" == "skipped" ]]; then
                  echo "Release readiness check passed or was skipped"
                else
                  echo "Release readiness check failed"
                  exit 1
                fi
              else
                if [[ "${{ steps.sonar_gate.outcome }}" == "success" || "${{ steps.sonar_gate.outcome }}" == "skipped" ]]; then
                  echo "SonarQube quality gate passed or was skipped"
                else
                  echo "SonarQube quality gate failed"
                  exit 1
                fi

                if [[ "${{ steps.unit_tests_gate.outcome }}" == "success" || "${{ steps.unit_tests_gate.outcome }}" == "skipped" ]]; then
                  echo "Unit tests gate passed or was skipped"
                else
                  echo "Unit tests gate failed"
                  exit 1
                fi

                if [[ "${{ steps.fossa_guard_gate.outcome }}" == "success" || "${{ steps.fossa_guard_gate.outcome }}" == "skipped" ]]; then
                  echo "FOSSA guard passed or was skipped"
                else
                  echo "FOSSA guard failed"
                  exit 1
                fi
              fi
            fi
          else
            echo "Build jobs failed"
            exit 1
          fi

          echo "All CI checks passed!"
