# Plugin Metadata:
# Name: sam-code-executor-tool
# Version: 0.1.0
# Description: A plugin that provides sandboxed Python code execution capabilities.

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: __COMPONENT_KEBAB_CASE_NAME__.log

shared_config:
  - broker_connection: &broker_connection
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
      broker_username: ${SOLACE_BROKER_USERNAME, default}
      broker_password: ${SOLACE_BROKER_PASSWORD, default}
      broker_vpn: ${SOLACE_BROKER_VPN, default}
      temporary_queue: ${USE_TEMPORARY_QUEUES, true}

  - models:
    general: &general_model
      model: ${LLM_SERVICE_GENERAL_MODEL_NAME}
      api_base: ${LLM_SERVICE_ENDPOINT}
      api_key: ${LLM_SERVICE_API_KEY}

  - services:
    session_service: &default_session_service
      type: "memory"
      default_behavior: "PERSISTENT"

    artifact_service: &default_artifact_service
      type: "filesystem"
      base_path: "/tmp/samv2"
      artifact_scope: namespace

apps:
  - name: __COMPONENT_KEBAB_CASE_NAME__-app
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection
    app_config:
      namespace: "${NAMESPACE}"
      agent_name: "__COMPONENT_PASCAL_CASE_NAME__"
      display_name: "__COMPONENT_SPACED_CAPITALIZED_NAME__ Agent"
      supports_streaming: true

      model: *general_model
      instruction: |
        You are a code execution assistant capable of running Python code.
        When users ask you to execute code, use the code executor tool.
        Always review the code before execution and explain what it does.
        Handle errors gracefully and provide helpful feedback.

      tools:
        - group_name: artifact_management
          tool_type: builtin-group

        # Basic code executor with defaults (network disabled for security)
        - tool_type: python
          component_module: "sam_code_executor_tool.tools"
          component_base_path: .
          class_name: "CodeExecutorTool"
          tool_config:
            tool_name: "execute_python"
            tool_description: "Execute Python code in a secure sandboxed environment. Network access is disabled."
            executor_type: "docker"
            default_timeout_seconds: 30
            max_output_size: 1048576
            docker:
              image: "${CODE_EXECUTOR_DOCKER_IMAGE, python:3.11-slim}"
              working_directory: "/workspace"
              memory_limit: "512m"
              cpu_limit: 1.0
              network_disabled: true
              environment:
                PYTHONDONTWRITEBYTECODE: "1"
              startup_command:
                enabled: false

        # Code executor with packages (git clone + pip install example)
        # Uncomment and configure to enable
        # - tool_type: python
        #   component_module: "sam_code_executor_tool.tools"
        #   component_base_path: .
        #   class_name: "CodeExecutorTool"
        #   tool_config:
        #     tool_name: "execute_python_with_packages"
        #     tool_description: "Execute Python code with pre-installed data science packages (numpy, pandas, matplotlib)"
        #     executor_type: "docker"
        #     default_timeout_seconds: 60
        #     docker:
        #       image: "python:3.11-slim"
        #       memory_limit: "1g"
        #       cpu_limit: 2.0
        #       network_disabled: false  # Required for git clone / pip install
        #       environment:
        #         PYTHONDONTWRITEBYTECODE: "1"
        #         GIT_REPO_URL: "${GIT_REPO_URL}"
        #       startup_command:
        #         enabled: true
        #         script_type: "shell"
        #         script: |
        #           apt-get update && apt-get install -y git
        #           pip install numpy pandas matplotlib
        #           if [ -n "$GIT_REPO_URL" ]; then
        #             git clone "$GIT_REPO_URL" /workspace/repo
        #           fi
        #           echo "Setup complete"
        #         timeout_seconds: 300

        # Python startup script example
        # Uncomment and configure to enable
        # - tool_type: python
        #   component_module: "sam_code_executor_tool.tools"
        #   component_base_path: .
        #   class_name: "CodeExecutorTool"
        #   tool_config:
        #     tool_name: "execute_python_custom_env"
        #     tool_description: "Execute Python with custom environment and pre-loaded data"
        #     executor_type: "docker"
        #     default_timeout_seconds: 60
        #     docker:
        #       image: "python:3.11-slim"
        #       network_disabled: false
        #       environment:
        #         DATA_SOURCE_URL: "${DATA_SOURCE_URL}"
        #       startup_command:
        #         enabled: true
        #         script_type: "python"
        #         script: |
        #           import subprocess
        #           import sys
        #           import os
        #
        #           # Install packages
        #           packages = ["requests", "pandas"]
        #           subprocess.check_call([sys.executable, "-m", "pip", "install"] + packages)
        #
        #           # Download data if URL provided
        #           data_url = os.environ.get("DATA_SOURCE_URL")
        #           if data_url:
        #               import requests
        #               resp = requests.get(data_url)
        #               with open("/workspace/data.json", "wb") as f:
        #                   f.write(resp.content)
        #
        #           print("Environment ready")
        #         timeout_seconds: 300

      session_service:
        type: "sql"
        database_url: "${__COMPONENT_UPPER_SNAKE_CASE_NAME___DATABASE_URL, sqlite:///__COMPONENT_SNAKE_CASE_NAME__.db}"
        default_behavior: "PERSISTENT"
      artifact_service: *default_artifact_service

      agent_card:
        description: "An agent that can execute Python code in a sandboxed environment."
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "execute_python_code"
            name: "Python Code Execution"
            description: "Execute Python code and return the results."

      agent_card_publishing:
        interval_seconds: 30

      agent_discovery:
        enabled: false

      inter_agent_communication:
        allow_list: []
